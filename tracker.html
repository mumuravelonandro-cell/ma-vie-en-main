  const [editMeals,  setEditMeals]  = useState(false);
  const [newMLabel,  setNewMLabel]  = useState("");
  const [newMEmoji,  setNewMEmoji]  = useState("🍽️");

  useEffect(() => {
    loadAll().then(data => {
      if (!data.days[todayKey()]) data.days[todayKey()] = EMPTY_DAY();
      setStore(data);
    });
  }, []);

  useEffect(() => { if (store) saveAll(store); }, [store]);

  const viewKey    = active === "today" ? todayKey() : active;
  const day        = store?.days?.[viewKey];
  const isToday    = viewKey === todayKey();
  const week       = last7();
  const streak     = store ? calcStreak(store.sport?.weeks || {}) : 0;

  const updDay = (fn) => setStore(prev => {
    const next = JSON.parse(JSON.stringify(prev));
    if (!next.days[viewKey]) next.days[viewKey] = EMPTY_DAY();
    fn(next.days[viewKey]);
    return next;
  });

  if (!store || !day) return (
    <div style={{ display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"system-ui",color:"#9B8B7E",fontSize:14 }}>Chargement...</div>
  );

  const getDayScore = (k) => {
    const d   = store.days[k];
    const idx = (() => { const dd=new Date(k+"T12:00:00").getDay(); return dd===0?6:dd-1; })();
    const wk  = weekKey(getMonday(new Date(k+"T12:00:00")));
    return calcScore(d, store.sport?.weeks?.[wk], idx, store);
  };
  const weekScores = week.map(k => ({ key:k, score: getDayScore(k) }));
  const todayScore = getDayScore(viewKey);

  const SECTIONS = [
    { id:"selfcare", label:"Self Care",    emoji:"🌅" },
    { id:"sport",    label:"Sport",        emoji:"🏋️" },
    { id:"humeur",   label:"Humeur",       emoji:"😊" },
    { id:"alim",     label:"Alimentation", emoji:"🥗" },
    { id:"noscroll", label:"No-Scroll",    emoji:"📵" },
    { id:"bilan",    label:"Bilan",        emoji:"📊" },
  ];

  return (
    <div style={{ fontFamily:"'DM Sans',system-ui,sans-serif",background:"#F5F0E8",minHeight:"100vh",color:"#1A1410" }}>
      <style>{`
        .tabs-desktop { display:flex; }
        .tabs-mobile  { display:none; }
        @media (max-width: 640px) {
          .tabs-desktop { display:none !important; }
          .tabs-mobile  { display:flex !important; }
        }
      `}</style>

      {/* HEADER */}
      <div style={{ background:"#1A1410",padding:"clamp(16px,4vw,24px) clamp(16px,4vw,32px) 0",position:"relative",overflow:"hidden" }}>
        <div style={{ position:"absolute",top:-40,right:-40,width:160,height:160,borderRadius:"50%",background:"#C4724A",opacity:0.1 }} />
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12,position:"relative",zIndex:1 }}>
          <div>
            <h1 style={{ fontFamily:"Georgia,serif",fontSize:"clamp(20px,3.5vw,32px)",color:"#F5F0E8",fontStyle:"italic",letterSpacing:"-0.3px" }}>
              Tracker <span style={{ color:"#C4724A" }}>quotidien</span>
            </h1>
            <div style={{ display:"flex",alignItems:"center",gap:8,marginTop:4 }}>
              <button onClick={()=>{ const d=new Date(viewKey+"T12:00:00"); d.setDate(d.getDate()-1); setActive(d.toISOString().slice(0,10)); }}
                style={{ background:"rgba(255,255,255,0.08)",border:"none",borderRadius:7,width:24,height:24,cursor:"pointer",color:"#9B8B7E",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0 }}>‹</button>
              <p style={{ color:"#9B8B7E",fontSize:12,margin:0 }}>
                {isToday ? fmtFull(todayKey()) : `📅 ${fmtFull(viewKey)}`}
              </p>
              <button onClick={()=>{ const d=new Date(viewKey+"T12:00:00"); d.setDate(d.getDate()+1); const next=d.toISOString().slice(0,10); setActive(next===todayKey()?"today":next); }}
                disabled={isToday}
                style={{ background:"rgba(255,255,255,0.08)",border:"none",borderRadius:7,width:24,height:24,cursor:isToday?"default":"pointer",color:isToday?"#3A3030":"#9B8B7E",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0 }}>›</button>
            </div>
          </div>
          {/* Score + Streak */}
          {(() => {
            const yesterKey = (() => { const d=new Date(viewKey+"T12:00:00"); d.setDate(d.getDate()-1); return d.toISOString().slice(0,10); })();
            const yesterScore = getDayScore(yesterKey);
            const diff = yesterScore > 0 ? todayScore - yesterScore : null;
            const sc = scoreColor(todayScore);
            const emoji = scoreEmoji(todayScore);
            // SVG arc
            const r = 26, cx = 32, cy = 32, circ = 2*Math.PI*r;
            const pct = todayScore/100;
            const dash = circ * pct;
            const gap  = circ - dash;
            return (
              <div style={{ display:"flex",gap:12,alignItems:"flex-start" }}>
                <StreakBadge streak={streak} />
                <div style={{ textAlign:"center",paddingBottom:4 }}>
                  {/* Arc SVG */}
                  <div style={{ position:"relative",width:64,height:64,margin:"0 auto" }}>
                    <svg width="64" height="64" style={{ transform:"rotate(-90deg)" }}>
                      <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth="5"/>
                      <circle cx={cx} cy={cy} r={r} fill="none" stroke={sc} strokeWidth="5"
                        strokeDasharray={`${dash} ${gap}`} strokeLinecap="round"
                        style={{ transition:"stroke-dasharray 0.6s ease" }}/>
                    </svg>
                    <div style={{ position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center" }}>
                      <span style={{ fontSize:18,lineHeight:1 }}>{emoji}</span>
                    </div>
                  </div>
                  {/* Chiffre + diff */}
                  <div style={{ marginTop:4,display:"flex",alignItems:"baseline",justifyContent:"center",gap:4 }}>
                    <span style={{ fontSize:18,fontWeight:700,color:sc,lineHeight:1 }}>{todayScore}</span>
                    <span style={{ fontSize:9,color:"#9B8B7E" }}>%</span>
                  </div>
                  {diff !== null && (
                    <div style={{ fontSize:9,color:diff>0?"#7A9E7E":diff<0?"#C4724A":"#9B8B7E",fontWeight:600,marginTop:2 }}>
                      {diff>0?`↑ +${diff}`:diff<0?`↓ ${diff}`:"= égal"} vs hier
                    </div>
                  )}
                  <div style={{ fontSize:9,color:"#9B8B7E",marginTop:2,maxWidth:72,lineHeight:1.3 }}>{scoreLabel(todayScore)}</div>
                </div>
              </div>
            );
          })()}
        </div>

        {/* Week bars */}
        <div style={{ display:"flex",gap:5,marginTop:18,paddingBottom:0 }}>
          {weekScores.map(({key,score})=>{
            const isSel = viewKey===key;
            const isT   = key===todayKey();
            const sc    = scoreColor(score);
            return (
              <div key={key} onClick={()=>setActive(isT?"today":key)}
                style={{ flex:1,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,paddingBottom:12 }}>
                <div style={{ fontSize:9,color:isSel?"#F5F0E8":"#9B8B7E",fontWeight:isSel?600:400 }}>
                  {isT?"auj.":fmtDate(key).split(" ")[0]}
                </div>
                <div style={{ width:"100%",height:36,background:"rgba(255,255,255,0.05)",borderRadius:5,overflow:"hidden",position:"relative" }}>
                  <div style={{ position:"absolute",bottom:0,left:0,right:0,height:`${score||3}%`,background:isSel?sc:`${sc}88`,borderRadius:5,transition:"height 0.4s ease" }} />
                </div>
                <div style={{ fontSize:10,color:isSel?sc:`${sc}aa`,fontWeight:600 }}>{score||"·"}%</div>
                <div style={{ width:isSel?16:0,height:2,background:"#C4724A",borderRadius:2,transition:"width 0.2s" }} />
              </div>
            );
          })}
        </div>
      </div>

      {/* TABS — desktop sticky top, hidden on mobile */}
      <div style={{ background:"white",borderBottom:"1px solid #E8DDD0",padding:"0 24px",display:"flex",overflowX:"auto",scrollbarWidth:"none",position:"sticky",top:0,zIndex:99 }} className="tabs-desktop">
        {SECTIONS.map(s=>(
          <button key={s.id} onClick={()=>setSection(s.id)} style={{
            padding:"13px 14px",border:"none",background:"none",fontFamily:"inherit",fontSize:12,fontWeight:500,cursor:"pointer",whiteSpace:"nowrap",
            color:section===s.id?"#C4724A":"#9B8B7E",
            borderBottom:section===s.id?"2px solid #C4724A":"2px solid transparent",
            marginBottom:-1,display:"flex",alignItems:"center",gap:5,transition:"color 0.15s"
          }}>
            {s.emoji} {s.label}
          </button>
        ))}
        {!isToday && (
          <button onClick={()=>setActive("today")} style={{ marginLeft:"auto",padding:"13px 14px",border:"none",background:"none",fontFamily:"inherit",fontSize:12,color:"#C4724A",cursor:"pointer",whiteSpace:"nowrap",fontWeight:500 }}>
            ← Aujourd'hui
          </button>
        )}
      </div>

      {/* CONTENT */}
      <div style={{ padding:"clamp(16px,4vw,28px) clamp(16px,4vw,32px)",maxWidth:section==="sport"?900:700,margin:"0 auto",paddingBottom:80 }}>

        {/* HUMEUR */}
        {section==="humeur" && (() => {
          const wkMoods = last7().map(iso => ({ iso, mood: store.days[iso]?.mood||null }));
          const moodMap = Object.fromEntries(MOODS.map(m=>[m.label,m]));
          const gratitude = day.gratitude || ["","",""];

          return (
            <div>
              {/* Humeur */}
              <div style={{ fontSize:11,fontWeight:600,letterSpacing:"2px",textTransform:"uppercase",color:"#9B8B7E",marginBottom:12 }}>Comment je me sens</div>
              <div style={{ display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:20 }}>
                {MOODS.map(m=>{
                  const act=day.mood===m.label;
                  return (
                    <div key={m.label} onClick={()=>isToday&&updDay(d=>{d.mood=d.mood===m.label?null:m.label;})}
                      style={{ background:act?m.color:"white",border:"1.5px solid "+(act?m.color:"#E8DDD0"),borderRadius:14,padding:"14px 10px",textAlign:"center",cursor:isToday?"pointer":"default",transition:"all 0.2s" }}>
                      <div style={{ fontSize:24,marginBottom:5 }}>{m.emoji}</div>
                      <div style={{ fontSize:12,fontWeight:500,color:act?"white":"#1A1410" }}>{m.label}</div>
                    </div>
                  );
                })}
              </div>

              {/* Énergie */}
              <div style={{ fontSize:11,fontWeight:600,letterSpacing:"2px",textTransform:"uppercase",color:"#9B8B7E",marginBottom:12 }}>Niveau d'énergie</div>
              <div style={{ display:"flex",gap:8,marginBottom:20 }}>
                {[
                  { val:"low",   emoji:"🪫", label:"Basse",   color:"#94A3B8" },
                  { val:"mid",   emoji:"⚡", label:"Normale", color:"#C9A84C" },
                  { val:"high",  emoji:"🔋", label:"Haute",   color:"#7A9E7E" },
                ].map(e=>{
                  const act=day.energy===e.val;
                  return (
                    <div key={e.val} onClick={()=>isToday&&updDay(d=>{d.energy=d.energy===e.val?null:e.val;})}
                      style={{ flex:1,padding:"12px 8px",borderRadius:14,border:"1.5px solid "+(act?e.color:"#E8DDD0"),background:act?e.color:"white",textAlign:"center",cursor:isToday?"pointer":"default",transition:"all 0.2s" }}>
                      <div style={{ fontSize:22,marginBottom:4 }}>{e.emoji}</div>
                      <div style={{ fontSize:12,fontWeight:600,color:act?"white":"#1A1410" }}>{e.label}</div>
                    </div>
                  );
                })}
              </div>

              {/* Historique semaine */}
              <div style={{ fontSize:11,fontWeight:600,letterSpacing:"2px",textTransform:"uppercase",color:"#9B8B7E",marginBottom:12 }}>Cette semaine</div>
              <div style={{ background:"white",borderRadius:16,border:"1px solid #E8DDD0",padding:"14px 16px",marginBottom:20 }}>
                <div style={{ display:"flex",gap:6,justifyContent:"space-between" }}>
                  {wkMoods.map((d,i)=>{
                    const m = d.mood ? moodMap[d.mood] : null;
                    const isT = d.iso===todayKey();
                    return (
                      <div key={d.iso} style={{ flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4 }}>
                        <div style={{ width:36,height:36,borderRadius:"50%",background:m?m.color:"#F5F0E8",border:isT?"2px solid #C4724A":"2px solid transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,transition:"all 0.2s" }}>
                          {m?m.emoji:""}
                        </div>
                        <div style={{ fontSize:8,color:isT?"#C4724A":"#9B8B7E",fontWeight:isT?700:400,textAlign:"center" }}>{DAYS_SHORT[i]}</div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Intention */}
              <div style={{ fontSize:11,fontWeight:600,letterSpacing:"2px",textTransform:"uppercase",color:"#9B8B7E",marginBottom:12 }}>Intention du jour</div>
              <div style={{ background:"white",borderRadius:16,border:"1px solid #E8DDD0",padding:"14px 18px",marginBottom:20 }}>
                <textarea disabled={!isToday} value={day.intention||""} onChange={e=>updDay(d=>{d.intention=e.target.value;})}
                  placeholder="Ce que je veux porter aujourd'hui..."
                  style={{ width:"100%",border:"none",background:"transparent",fontFamily:"Georgia,serif",fontSize:14,color:"#1A1410",resize:"none",outline:"none",minHeight:60,lineHeight:1.8,fontStyle:"italic" }} />
              </div>

              {/* Gratitude */}
              <div style={{ fontSize:11,fontWeight:600,letterSpacing:"2px",textTransform:"uppercase",color:"#9B8B7E",marginBottom:12 }}>Gratitude</div>
              <div style={{ background:"white",borderRadius:16,border:"1px solid #E8DDD0",padding:"14px 18px",marginBottom:20 }}>
                <div style={{ fontSize:12,color:"#9B8B7E",fontStyle:"italic",marginBottom:12 }}>3 choses pour lesquelles je suis reconnaissante aujourd'hui</div>
                {[0,1,2].map(i=>(
                  <div key={i} style={{ display:"flex",alignItems:"center",gap:10,marginBottom:i<2?10:0 }}>
                    <div style={{ width:22,height:22,borderRadius:"50%",background:"#F5F0E8",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#C4724A",flexShrink:0 }}>{i+1}</div>
                    <input disabled={!isToday} value={gratitude[i]||""}
                      onChange={e=>updDay(d=>{ const g=[...(d.gratitude||["","",""])]; g[i]=e.target.value; d.gratitude=g; })}
                      placeholder={"Je suis reconnaissante pour..."}
                      style={{ flex:1,border:"none",borderBottom:"1px solid #EDE8E0",background:"transparent",fontFamily:"inherit",fontSize:13,color:"#1A1410",outline:"none",padding:"4px 0",lineHeight:1.6 }} />
                  </div>
                ))}
              </div>

              {/* Journal des 7 derniers jours */}
              {(() => {
                const [journalOpen, setJournalOpen] = React.useState(false);
                const past = last7()
                  .filter(iso => iso !== todayKey())
                  .map(iso => ({
                    iso,
                    intention: store.days[iso]?.intention || "",
                    gratitude: store.days[iso]?.gratitude || [],
                    mood: store.days[iso]?.mood || null,
                  }))
                  .filter(d => d.intention || d.gratitude.some(g => g));

                if (!past.length) return null;

                return (
                  <div>
                    <button onClick={()=>setJournalOpen(o=>!o)}
                      style={{ width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 18px",background:journalOpen?"#1A1410":"white",border:"1.5px solid "+(journalOpen?"#1A1410":"#E8DDD0"),borderRadius:journalOpen?"14px 14px 0 0":14,cursor:"pointer",fontFamily:"inherit",transition:"all 0.2s" }}>
                      <div style={{ display:"flex",alignItems:"center",gap:10 }}>
                        <span style={{ fontSize:17 }}>📖</span>
                        <div style={{ textAlign:"left" }}>
                          <div style={{ fontSize:13,fontWeight:600,color:journalOpen?"#F5F0E8":"#1A1410" }}>Journal de la semaine</div>
                          <div style={{ fontSize:11,color:"#9B8B7E",marginTop:1 }}>{past.length} entrée{past.length>1?"s":""} cette semaine</div>
                        </div>
                      </div>
                      <span style={{ fontSize:13,color:journalOpen?"#C4724A":"#9B8B7E" }}>{journalOpen?"▲":"▼"}</span>
                    </button>

                    {journalOpen && (
                      <div style={{ background:"white",border:"1.5px solid #1A1410",borderTop:"none",borderRadius:"0 0 14px 14px" }}>
                        {past.map((entry, idx) => {
                          const moodObj = MOODS.find(m=>m.label===entry.mood);
                          const d = new Date(entry.iso+"T12:00:00");
                          const dayNames = ["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];
                          const months   = ["jan","fév","mar","avr","mai","jun","jul","aoû","sep","oct","nov","déc"];
                          const label    = `${dayNames[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;

                          return (
                            <div key={entry.iso} style={{ padding:"14px 18px",borderBottom:idx<past.length-1?"1px solid #F5F0E8":"none" }}>
                              {/* Entête : date + humeur */}
                              <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:10 }}>
                                <div style={{ fontSize:11,fontWeight:700,color:"#C4724A",letterSpacing:"0.5px" }}>{label}</div>
                                {moodObj && (
                                  <div style={{ display:"flex",alignItems:"center",gap:4,background:moodObj.color+"18",borderRadius:20,padding:"2px 8px" }}>
                                    <span style={{ fontSize:13 }}>{moodObj.emoji}</span>
                                    <span style={{ fontSize:10,fontWeight:600,color:moodObj.color }}>{moodObj.label}</span>
                                  </div>
                                )}
                              </div>

                              {/* Intention */}
                              {entry.intention && (
                                <div style={{ marginBottom:entry.gratitude.some(g=>g)?10:0 }}>
                                  <div style={{ fontSize:9,color:"#B0A090",textTransform:"uppercase",letterSpacing:"1.5px",marginBottom:5 }}>Intention</div>
                                  <div style={{ fontFamily:"Georgia,serif",fontStyle:"italic",fontSize:13,color:"#1A1410",lineHeight:1.7,background:"#FAFAF8",borderRadius:10,padding:"10px 14px",borderLeft:"3px solid #C4724A" }}>
                                    "{entry.intention}"
                                  </div>
                                </div>
                              )}

                              {/* Gratitude */}
                              {entry.gratitude.some(g=>g) && (
                                <div style={{ marginTop:entry.intention?8:0 }}>
                                  <div style={{ fontSize:9,color:"#B0A090",textTransform:"uppercase",letterSpacing:"1.5px",marginBottom:6 }}>Gratitude</div>
                                  <div style={{ display:"flex",flexDirection:"column",gap:4 }}>
                                    {entry.gratitude.filter(g=>g).map((g,gi)=>(
                                      <div key={gi} style={{ display:"flex",alignItems:"flex-start",gap:8 }}>
                                        <span style={{ fontSize:11,color:"#C9A84C",fontWeight:700,marginTop:1,flexShrink:0 }}>{gi+1}.</span>
                                        <span style={{ fontSize:13,color:"#1A1410",lineHeight:1.5 }}>{g}</span>
                                      </div>
                                    ))}
                                  </div>
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                );
              })()}

            </div>
          );
        })()}

        {/* SPORT */}
        {section==="sport" && <SportTab store={store} setStore={setStore} day={day} updDay={updDay} isToday={isToday} />}

        {/* NO SCROLL */}
        {section==="noscroll" && (() => {
          // rules come from store, fallback to defaults
          const rules = store.noscrollRules || DEFAULT_NOSCROLL_RULES;
          const noscroll = day.noscroll || {};
          const doneCnt  = rules.filter(r=>noscroll[r.key]).length;
          const total    = rules.length;
          const allDone  = doneCnt === total && total > 0;
          const pct      = total > 0 ? Math.round((doneCnt/total)*100) : 0;
          const scoreCol = allDone ? "#7A9E7E" : doneCnt >= total*0.5 ? "#C9A84C" : "#C4724A";

          // streak: count consecutive days where all rules were done
          const nsStreak = (() => {
            let s = 0;
            const d = new Date(); d.setDate(d.getDate()-1);
            for(let i=0;i<365;i++){
              const iso=d.toISOString().slice(0,10);
              const dayRules=store.days[iso]?.noscroll||{};
              const dayDone=rules.filter(r=>dayRules[r.key]).length;
              if(dayDone===total && total>0){ s++; d.setDate(d.getDate()-1); } else break;
            }
            // count today if all done
            if(doneCnt===total && total>0) s++;
            return s;
          })();

          // week history (last 7 days)
          const nsWeek = last7().map(iso=>{
            const dayRules=store.days[iso]?.noscroll||{};
            const cnt=rules.filter(r=>dayRules[r.key]).length;
            return { iso, cnt, pct: total>0?cnt/total:0 };
          });

          // daily quote (deterministic by day)
          const quoteIdx = new Date().getDate() % NOSCROLL_QUOTES.length;
          const quote = NOSCROLL_QUOTES[quoteIdx];

          // edit rules state — local
          const saveRules = (r) => setStore(prev=>({ ...prev, noscrollRules: r }));
          const addRule = () => {
            if(!newLabel.trim()) return;
            const key = `custom_${Date.now()}`;
            saveRules([...rules, { key, emoji:newEmoji, label:newLabel.trim() }]);
            setNewLabel(""); setNewEmoji("📵");
          };
          const removeRule = (key) => saveRules(rules.filter(r=>r.key!==key));

          return (
            <div>
              {/* Quote */}
              <div style={{ background:"#1A1410",borderRadius:16,padding:"18px 22px",marginBottom:22,position:"relative",overflow:"hidden" }}>
                <div style={{ position:"absolute",top:-20,right:-20,width:80,height:80,borderRadius:"50%",background:"#C4724A",opacity:0.15 }} />
                <div style={{ fontSize:11,color:"#9B8B7E",letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:8 }}>Intention du jour</div>
                <div style={{ fontFamily:"Georgia,serif",fontStyle:"italic",fontSize:15,color:"#F5F0E8",lineHeight:1.6 }}>"{quote}"</div>
              </div>

              {/* Score + streak row */}
              <div style={{ display:"flex",gap:10,marginBottom:22 }}>
                {/* Score */}
                <div style={{ flex:1,background:"white",borderRadius:16,border:"1px solid #E8DDD0",padding:"16px 18px",display:"flex",alignItems:"center",gap:14 }}>
                  <div style={{ position:"relative",width:52,height:52,flexShrink:0 }}>
                    <svg width="52" height="52" style={{ transform:"rotate(-90deg)" }}>
                      <circle cx="26" cy="26" r="22" fill="none" stroke="#F5F0E8" strokeWidth="4"/>
                      <circle cx="26" cy="26" r="22" fill="none" stroke={scoreCol} strokeWidth="4"
                        strokeDasharray={`${2*Math.PI*22}`}
                        strokeDashoffset={`${2*Math.PI*22*(1-pct/100)}`}
                        strokeLinecap="round" style={{ transition:"stroke-dashoffset 0.5s ease" }}/>
                    </svg>
                    <div style={{ position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:scoreCol }}>
                      {doneCnt}/{total}
                    </div>
                  </div>
                  <div>
                    <div style={{ fontSize:14,fontWeight:600 }}>
                      {allDone ? "Journée parfaite 🎉" : doneCnt===0 ? "C'est parti !" : `${doneCnt} règle${doneCnt>1?"s":""} tenue${doneCnt>1?"s":""}`}
                    </div>
                    <div style={{ fontSize:11,color:"#9B8B7E",marginTop:2 }}>{pct}% des règles respectées</div>
                  </div>
                </div>
                {/* Streak */}
                <div style={{ background:nsStreak>0?"#1A1410":"white",borderRadius:16,border:"1px solid #E8DDD0",padding:"16px 18px",textAlign:"center",minWidth:80 }}>
                  <div style={{ fontSize:20,lineHeight:1 }}>{nsStreak>=7?"🔥":nsStreak>=3?"⚡":"📵"}</div>
                  <div style={{ fontSize:20,fontWeight:700,color:nsStreak>0?"#C9A84C":"#9B8B7E",fontFamily:"Georgia,serif",lineHeight:1.3 }}>{nsStreak}</div>
                  <div style={{ fontSize:10,color:"#9B8B7E",marginTop:2 }}>jour{nsStreak>1?"s":""}</div>
                </div>
              </div>

              {/* Week history */}
              <div style={{ background:"white",borderRadius:16,border:"1px solid #E8DDD0",padding:"14px 18px",marginBottom:22 }}>
                <div style={{ fontSize:11,fontWeight:600,letterSpacing:"1.5px",textTransform:"uppercase",color:"#9B8B7E",marginBottom:12 }}>Cette semaine</div>
                <div style={{ display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6 }}>
                  {nsWeek.map((d,i)=>{
                    const isT=d.iso===todayKey();
                    const col=d.pct>=1?"#7A9E7E":d.pct>=0.5?"#C9A84C":d.pct>0?"#C4724A":"#E8DDD0";
                    return (
                      <div key={d.iso} style={{ display:"flex",flexDirection:"column",alignItems:"center",gap:3 }}>
                        <div style={{ fontSize:9,fontWeight:700,letterSpacing:"1px",textTransform:"uppercase",color:isT?"#C4724A":"#9B8B7E" }}>{DAYS_SHORT[i]}</div>
                        <div style={{ width:32,height:32,borderRadius:10,background:d.pct>0?col+"22":"#F5F0E8",border:`2px solid ${isT?"#C4724A":d.pct>0?col:"#E8DDD0"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14 }}>
                          {d.pct>=1?"✅":d.pct>0?"·":""}
                        </div>
                        <div style={{ fontSize:9,color:col,fontWeight:600 }}>{d.cnt>0?`${d.cnt}/${total}`:""}</div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Rules list */}
              <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12 }}>
                <div style={{ fontSize:11,fontWeight:600,letterSpacing:"2px",textTransform:"uppercase",color:"#9B8B7E" }}>Mes règles</div>
                <button onClick={()=>setEditRules(!editRules)}
                  style={{ background:editRules?"#1A1410":"#F5F0E8",border:"none",borderRadius:8,padding:"4px 10px",fontSize:11,cursor:"pointer",color:editRules?"white":"#9B8B7E",fontFamily:"inherit",fontWeight:500,transition:"all 0.15s" }}>
                  {editRules?"✓ OK":"✏️ Modifier"}
                </button>
              </div>
              <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
                {rules.map(n=>{
                  const done=noscroll[n.key];
                  return (
                    <div key={n.key} style={{ display:"flex",alignItems:"center",gap:10 }}>
                      <div onClick={()=>isToday&&updDay(d=>{d.noscroll[n.key]=!d.noscroll[n.key];})}
                        style={{ flex:1,background:done?"#1A1410":"white",border:`1.5px solid ${done?"#1A1410":"#E8DDD0"}`,borderRadius:14,padding:"14px 18px",cursor:isToday?"pointer":"default",display:"flex",alignItems:"center",gap:12,transition:"all 0.2s" }}>
                        <span style={{ fontSize:20 }}>{n.emoji}</span>
                        <span style={{ flex:1,fontSize:13,fontWeight:500,color:done?"#F5F0E8":"#1A1410" }}>{n.label}</span>
                        <div style={{ width:22,height:22,borderRadius:"50%",background:done?"#7A9E7E":"transparent",border:`2px solid ${done?"#7A9E7E":"#C8BEB5"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"white",flexShrink:0,transition:"all 0.2s" }}>
                          {done&&"✓"}
                        </div>
                      </div>
                      {editRules && (
                        <button onClick={()=>removeRule(n.key)}
                          style={{ background:"#FEF0F0",border:"1.5px solid #FECACA",borderRadius:10,padding:"8px 10px",color:"#E05252",fontSize:13,cursor:"pointer",flexShrink:0 }}>✕</button>
                      )}
                    </div>
                  );
                })}
                {/* Add rule */}
                {editRules && (
                  <div style={{ background:"#F5F0E8",borderRadius:14,padding:"12px 14px",display:"flex",gap:8,alignItems:"center",marginTop:4 }}>
                    <input value={newEmoji} onChange={e=>setNewEmoji(e.target.value)}
                      style={{ width:36,border:"1.5px solid #E8DDD0",borderRadius:8,padding:"6px",fontFamily:"inherit",fontSize:16,textAlign:"center",outline:"none",background:"white" }} />
                    <input value={newLabel} onChange={e=>setNewLabel(e.target.value)}
                      onKeyDown={e=>e.key==="Enter"&&addRule()}
                      placeholder="Nouvelle règle..."
                      style={{ flex:1,border:"1.5px solid #E8DDD0",borderRadius:8,padding:"7px 10px",fontFamily:"inherit",fontSize:13,outline:"none",background:"white" }} />
                    <button onClick={addRule}
                      style={{ background:"#1A1410",border:"none",borderRadius:9,padding:"7px 13px",color:"white",fontSize:12,cursor:"pointer",fontFamily:"inherit",fontWeight:500 }}>+ Ajouter</button>
                  </div>
                )}
              </div>

              {/* Screen time + note */}
              <div style={{ marginTop:22 }}>
                <div style={{ fontSize:11,fontWeight:600,letterSpacing:"2px",textTransform:"uppercase",color:"#9B8B7E",marginBottom:12 }}>Temps d'écran</div>
                <div style={{ background:"white",borderRadius:16,border:"1px solid #E8DDD0",padding:"16px 18px",marginBottom:12 }}>
                  <div style={{ display:"flex",alignItems:"center",gap:12,marginBottom:14 }}>
                    <span style={{ fontSize:20 }}>📱</span>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:13,fontWeight:600,marginBottom:2 }}>Heures d'écran aujourd'hui</div>
                      <div style={{ fontSize:11,color:"#9B8B7E" }}>Depuis les réglages de ton téléphone</div>
                    </div>
                    <div style={{ display:"flex",alignItems:"center",gap:6,background:"#F5F0E8",borderRadius:12,padding:"8px 14px" }}>
                      <input
                        type="number" min="0" max="24" step="0.5"
                        value={day.screenTime ?? ""}
                        onChange={e=>isToday&&updDay(d=>{d.screenTime=e.target.value===""?null:parseFloat(e.target.value);})}
                        disabled={!isToday}
                        placeholder="—"
                        style={{ border:"none",background:"transparent",fontFamily:"inherit",fontSize:16,fontWeight:700,color:"#1A1410",outline:"none",width:40,textAlign:"center" }}
                      />
                      <span style={{ fontSize:12,color:"#9B8B7E",fontWeight:500 }}>h</span>
                    </div>
                  </div>
                  {/* Visual bar */}
                  {day.screenTime !== null && day.screenTime !== undefined && (
                    <>
                      <div style={{ height:6,background:"#F5F0E8",borderRadius:20,overflow:"hidden",marginBottom:6 }}>
                        <div style={{
                          height:"100%",
                          width:`${Math.min((day.screenTime/6)*100,100)}%`,
                          background: day.screenTime<=2?"#7A9E7E":day.screenTime<=4?"#C9A84C":"#E05252",
                          borderRadius:20,transition:"width 0.4s ease"
                        }} />
                      </div>
                      <div style={{ fontSize:11,color: day.screenTime<=2?"#7A9E7E":day.screenTime<=4?"#C9A84C":"#E05252",fontWeight:600 }}>
                        {day.screenTime<=2?"🌟 Excellent — moins de 2h":day.screenTime<=3?"✨ Bien — dans l'objectif":day.screenTime<=4?"⚠️ Un peu beaucoup":"🔴 Journée d'écran intense"}
                      </div>
                    </>
                  )}
                  {/* Week sparkline */}
                  {(() => {
                    const wkScreen = last7().map(iso => store.days[iso]?.screenTime ?? null);
                    const hasData  = wkScreen.some(v=>v!==null);
                    if(!hasData) return null;
                    return (
                      <div style={{ marginTop:14,paddingTop:12,borderTop:"1px solid #F5F0E8" }}>
                        <div style={{ fontSize:10,color:"#9B8B7E",marginBottom:8 }}>Cette semaine</div>
                        <div style={{ display:"flex",gap:5,alignItems:"flex-end",height:32 }}>
                          {wkScreen.map((v,i)=>{
                            const h = v!==null ? Math.min((v/8)*100,100) : 0;
                            const col = v===null?"#E8DDD0":v<=2?"#7A9E7E":v<=4?"#C9A84C":"#E05252";
                            const isT = last7()[i]===todayKey();
                            return (
                              <div key={i} style={{ flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2 }}>
                                <div style={{ width:"100%",height:28,display:"flex",alignItems:"flex-end",justifyContent:"center" }}>
                                  <div style={{ width:"100%",height:`${h||4}%`,minHeight:3,background:col,borderRadius:4,opacity:isT?1:0.6,transition:"height 0.3s" }} />
                                </div>
                                <div style={{ fontSize:8,color:isT?"#C4724A":"#9B8B7E",fontWeight:isT?700:400 }}>{DAYS_SHORT[i]}</div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })()}
                </div>

                {/* Scroll note */}
                <div style={{ background:"white",borderRadius:16,border:"1px solid #E8DDD0",padding:"14px 18px" }}>
                  <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:10 }}>
                    <span style={{ fontSize:16 }}>📝</span>
                    <span style={{ fontSize:13,fontWeight:600 }}>Note du jour</span>
                    <span style={{ fontSize:11,color:"#9B8B7E",marginLeft:"auto",fontStyle:"italic" }}>optionnel</span>
                  </div>
                  <textarea
                    disabled={!isToday}
                    value={day.scrollNote||""}
                    onChange={e=>updDay(d=>{d.scrollNote=e.target.value;})}
                    placeholder="Quand as-tu craqué ? Dans quel contexte ? Ce que tu ressens..."
                    style={{ width:"100%",border:"none",background:"transparent",fontFamily:"inherit",fontSize:13,color:"#1A1410",resize:"none",outline:"none",minHeight:60,lineHeight:1.7,color:"#1A1410" }}
                  />
                </div>
              </div>

            </div>
          );
        })()}

        {/* ALIM & EAU */}
        {section==="alim" && <AlimTab store={store} setStore={setStore} day={day} updDay={updDay} isToday={isToday} editMeals={editMeals} setEditMeals={setEditMeals} newMLabel={newMLabel} setNewMLabel={setNewMLabel} newMEmoji={newMEmoji} setNewMEmoji={setNewMEmoji} />}

                {/* SELF CARE */}
        {section==="selfcare" && <SelfCareTab store={store} setStore={setStore} day={day} updDay={updDay} isToday={isToday} editKey={editMeals} setEditKey={setEditMeals} newEmoji={newMEmoji} setNewEmoji={setNewMEmoji} newLabel={newMLabel} setNewLabel={setNewMLabel} />}

        {/* BILAN */}
        {section==="bilan" && <BilanTab store={store} />}

      </div>

      {/* BOTTOM NAV — mobile only */}
      <div className="tabs-mobile" style={{ position:"fixed",bottom:0,left:0,right:0,background:"white",borderTop:"1px solid #E8DDD0",display:"flex",zIndex:200,paddingBottom:"env(safe-area-inset-bottom,0px)" }}>
        {SECTIONS.map(s=>(
          <button key={s.id} onClick={()=>setSection(s.id)} style={{
            flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
            padding:"8px 4px",border:"none",background:"none",fontFamily:"inherit",cursor:"pointer",
            color:section===s.id?"#C4724A":"#9B8B7E",transition:"color 0.15s",gap:2
          }}>
            <span style={{ fontSize:20 }}>{s.emoji}</span>
            <span style={{ fontSize:9,fontWeight:section===s.id?700:400,letterSpacing:"0.3px" }}>{s.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Tracker />);

</script>
</body>
</html>
