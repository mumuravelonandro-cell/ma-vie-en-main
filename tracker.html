const todayKey = () => new Date().toISOString().slice(0, 10);
const fmtDate = (iso) => {
  const d = new Date(iso + "T12:00:00");
  const days = ["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];
  const months = ["jan","fév","mar","avr","mai","jun","jul","aoû","sep","oct","nov","déc"];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
};
const fmtFull = (iso) => {
  const d = new Date(iso + "T12:00:00");
  const days = ["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
  const months = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
};
const getMonday = (date = new Date()) => {
  const d = new Date(date);
  const day = d.getDay();
  d.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  d.setHours(0,0,0,0);
  return d;
};
const weekKey      = (monday) => monday.toISOString().slice(0,10);
const todayDayIdx  = () => { const d = new Date().getDay(); return d === 0 ? 6 : d - 1; };
const fmtWeekRange = (monday) => {
  const sun = new Date(monday); sun.setDate(sun.getDate()+6);
  const months = ["jan","fév","mar","avr","mai","jun","jul","aoû","sep","oct","nov","déc"];
  if (monday.getMonth()===sun.getMonth()) return `${monday.getDate()} – ${sun.getDate()} ${months[sun.getMonth()]}`;
  return `${monday.getDate()} ${months[monday.getMonth()]} – ${sun.getDate()} ${months[sun.getMonth()]}`;
};

// ── streak calculator ──────────────────────────────────────────────────────────
const calcStreak = (sportWeeks) => {
  let streak = 0;
  const d = new Date();
  d.setDate(d.getDate() - 1);
  for (let i = 0; i < 365; i++) {
    const iso = d.toISOString().slice(0,10);
    const idx = (() => { const dd = new Date(iso+"T12:00:00").getDay(); return dd===0?6:dd-1; })();
    const wk  = weekKey(getMonday(new Date(iso+"T12:00:00")));
    const sessions = sportWeeks[wk]?.[idx] || [];
    const active = sessions.some(s => s.status==="done" && s.type!=="rest");
    if (active) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  const todayWk = weekKey(getMonday());
  const todaySessions = sportWeeks[todayWk]?.[todayDayIdx()] || [];
  if (todaySessions.some(s => s.status==="done" && s.type!=="rest")) streak++;
  return streak;
};

// ── score ──────────────────────────────────────────────────────────────────────
const calcScore = (day, sportWeek, dayIdx, store) => {
  if (!day) return 0;
  let done = 0, total = 0;

  // Humeur (1pt)
  total++; if (day.mood) done++;

  // Énergie (1pt)
  total++; if (day.energy) done++;

  // No-scroll — ratio sur les règles actives
  const noscrollRules = store?.noscrollRules || DEFAULT_NOSCROLL_RULES;
  const noscroll = day.noscroll || {};
  total += noscrollRules.length;
  done  += noscrollRules.filter(r => noscroll[r.key]).length;

  // Morning routine — ratio sur items actifs
  const morningItems = store?.morningItems || DEFAULT_MORNING;
  const mDone = morningItems.filter(it => (day.morning||{})[it.key]).length;
  total += morningItems.length; done += mDone;

  // Evening routine
  const eveningItems = store?.eveningItems || DEFAULT_EVENING;
  const eDone = eveningItems.filter(it => (day.evening||{})[it.key]).length;
  total += eveningItems.length; done += eDone;

  // Sport
  if (sportWeek && sportWeek[dayIdx]) {
    const sessions = sportWeek[dayIdx].filter(s => s.type !== "rest");
    total += Math.max(sessions.length, 1);
    done  += sessions.filter(s => s.status === "done").length;
  } else { total += 1; }

  return Math.round((done / total) * 100);
};

        <div style={{ display:"flex",alignItems:"center",gap:7 }}>
          <span style={{ fontSize:17 }}>{sub?.emoji || sport.emoji}</span>
          <div>
            <div style={{ fontSize:13,fontWeight:600,color:isDone?sport.color:"#1A1410" }}>
              {sub ? sub.label : sport.label}
              {session.km ? <span style={{ fontSize:11,color:"#9B8B7E",fontWeight:400,marginLeft:6 }}>{session.km} km</span> : null}
            </div>
            {session.hour && <div style={{ fontSize:11,color:"#9B8B7E",marginTop:1 }}>{session.hour}</div>}
          </div>
        </div>
      </div>
      {/* Status badge — click to cycle missed/planned */}
      <div onClick={e=>{ e.stopPropagation(); onClick && onClick(); }}
        style={{ fontSize:11,fontWeight:600,color:statV.color,background:statV.bg,padding:"3px 9px",borderRadius:20,whiteSpace:"nowrap",cursor:"pointer",flexShrink:0 }}>
        {statV.icon} {statV.label}
      </div>
    </div>
  );
};

// ── STREAK BADGE ───────────────────────────────────────────────────────────────
const StreakBadge = ({ streak }) => {
  if (streak === 0) return null;
  const fire = streak >= 14 ? "🔥🔥" : streak >= 7 ? "🔥" : "⚡";
  return (
    <div style={{ display:"flex",flexDirection:"column",alignItems:"center",paddingBottom:4 }}>
      <div style={{ background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:12,padding:"8px 14px",textAlign:"center",minWidth:58 }}>
        <div style={{ fontSize:18,lineHeight:1 }}>{fire}</div>
        <div style={{ fontSize:17,fontWeight:700,color:"#C9A84C",fontFamily:"Georgia,serif",lineHeight:1.2,marginTop:3 }}>{streak}</div>
      </div>
      <div style={{ fontSize:10,color:"#9B8B7E",marginTop:4 }}>{streak===1?"1 jour":`${streak} jours`}</div>
    </div>
  );
};

// ── ALIM TAB ───────────────────────────────────────────────────────────────────
const AlimTab = ({ store, setStore, day, updDay, isToday, editMeals, setEditMeals, newMLabel, setNewMLabel, newMEmoji, setNewMEmoji }) => {
  const intentions = store.foodIntentions || DEFAULT_FOOD_INTENTIONS;
  const curWeekMon = weekKey(getMonday());
  const [alimView,    setAlimView]    = React.useState("jour");   // "semaine" | "jour"
  const [expandedDay, setExpandedDay] = React.useState(todayKey());

  const updMenu = (dayIso, slot, val) => setStore(prev => {
    const wkKey = weekKey(getMonday(new Date(dayIso+"T12:00:00")));
    const next = JSON.parse(JSON.stringify(prev));
    if(!next.weekMenus) next.weekMenus = {};
    if(!next.weekMenus[wkKey]) next.weekMenus[wkKey] = {};
    if(!next.weekMenus[wkKey][dayIso]) next.weekMenus[wkKey][dayIso] = {};
    next.weekMenus[wkKey][dayIso][slot] = val;
    return next;
  });

  const getMenu = (dayIso) => {
    const wkKey = weekKey(getMonday(new Date(dayIso+"T12:00:00")));
    return store.weekMenus?.[wkKey]?.[dayIso] || {};
  };

  const pastEntries = (slot) => {
    const entries = Object.values(store.weekMenus||{})
      .flatMap(w => Object.values(w)).filter(Boolean)
      .map(d => d[slot]).filter(Boolean).map(s => s.trim()).filter(Boolean);
    return [...new Set(entries)].slice(-20);
  };

  const saveIntentions = (r) => setStore(prev => ({...prev, foodIntentions: r}));
  const addIntention   = () => {
    if(!newMLabel.trim()) return;
    saveIntentions([...intentions, {key:"fi_"+Date.now(), emoji:newMEmoji, label:newMLabel.trim(), desc:""}]);
    setNewMLabel(""); setNewMEmoji("🌿");
  };

  // Bilan 80/20
  const days80 = last7().map(iso => {
    const dm = getMenu(iso);
    const lb = dm.lunchBalance||null, db = dm.dinnerBalance||null;
    if(!lb && !db) return null;
    if(lb==="red"||db==="red") return "red";
    if(lb==="yellow"||db==="yellow") return "yellow";
    return "green";
  });
  const greens  = days80.filter(v=>v==="green").length;
  const yellows = days80.filter(v=>v==="yellow").length;
  const reds    = days80.filter(v=>v==="red").length;
  const filled  = days80.filter(Boolean).length;
  const ratio   = filled > 0 ? Math.round((greens/filled)*100) : null;
  const colMap  = { green:"#7A9E7E", yellow:"#C9A84C", red:"#E05252" };
  const balMap  = { green:"🟢", yellow:"🟡", red:"🔴" };

  return (
    <div>

      {/* ── INTENTIONS repliables ── */}
      {(() => {
        const [open, setOpen] = React.useState(false);
        return (
          <div style={{ marginBottom:16 }}>
            <button onClick={()=>setOpen(o=>!o)}
              style={{ width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 18px",background:open?"#1A1410":"white",border:"1.5px solid "+(open?"#1A1410":"#E8DDD0"),borderRadius:open?"14px 14px 0 0":14,cursor:"pointer",fontFamily:"inherit",transition:"all 0.2s" }}>
              <div style={{ display:"flex",alignItems:"center",gap:10 }}>
                <span style={{ fontSize:17 }}>🌿</span>
                <div style={{ textAlign:"left" }}>
                  <div style={{ fontSize:13,fontWeight:600,color:open?"#F5F0E8":"#1A1410" }}>Mes intentions</div>
                  <div style={{ fontSize:11,color:"#9B8B7E",marginTop:1 }}>{intentions.length} intention{intentions.length>1?"s":""}</div>
                </div>
              </div>
              <span style={{ fontSize:13,color:open?"#C4724A":"#9B8B7E" }}>{open?"▲":"▼"}</span>
            </button>
            {open && (
              <div style={{ background:"white",border:"1.5px solid #1A1410",borderTop:"none",borderRadius:"0 0 14px 14px" }}>
                {intentions.map((intent,idx) => (
                  <div key={intent.key} style={{ padding:"11px 18px",borderBottom:idx<intentions.length-1?"1px solid #F5F0E8":"none",display:"flex",alignItems:"center",gap:10 }}>
                    {editMeals && <button onClick={()=>saveIntentions(intentions.filter(x=>x.key!==intent.key))} style={{ background:"#FEF0F0",border:"1.5px solid #FECACA",borderRadius:7,padding:"3px 7px",color:"#E05252",fontSize:11,cursor:"pointer",flexShrink:0 }}>✕</button>}
                    <span style={{ fontSize:17,flexShrink:0 }}>{intent.emoji}</span>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:13,fontWeight:600,color:"#1A1410" }}>{intent.label}</div>
                      {intent.desc && <div style={{ fontSize:11,color:"#9B8B7E",fontStyle:"italic" }}>{intent.desc}</div>}
                    </div>
                  </div>
                ))}
                {editMeals && (
                  <div style={{ display:"flex",gap:7,alignItems:"center",padding:"10px 18px",background:"#F5F0E8",borderRadius:"0 0 14px 14px" }}>
                    <input value={newMEmoji} onChange={e=>setNewMEmoji(e.target.value)} style={{ width:34,border:"1.5px solid #E8DDD0",borderRadius:7,padding:"5px",fontSize:15,textAlign:"center",outline:"none",background:"white",fontFamily:"inherit" }} />
                    <input value={newMLabel} onChange={e=>setNewMLabel(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addIntention()} placeholder="Nouvelle intention..." style={{ flex:1,border:"1.5px solid #E8DDD0",borderRadius:7,padding:"6px 10px",fontFamily:"inherit",fontSize:13,outline:"none",background:"white" }} />
                    <button onClick={addIntention} style={{ background:"#1A1410",border:"none",borderRadius:8,padding:"6px 12px",color:"white",fontSize:12,cursor:"pointer",fontFamily:"inherit",fontWeight:500 }}>+</button>
                  </div>
                )}
                <div style={{ padding:"9px 18px",borderTop:"1px solid #F5F0E8",display:"flex",justifyContent:"flex-end" }}>
                  <button onClick={()=>setEditMeals(!editMeals)} style={{ background:editMeals?"#1A1410":"#F5F0E8",border:"none",borderRadius:8,padding:"5px 12px",fontSize:11,cursor:"pointer",color:editMeals?"white":"#9B8B7E",fontFamily:"inherit",fontWeight:500 }}>
                    {editMeals?"✓ OK":"✏️ Modifier"}
                  </button>
                </div>
              </div>
            )}
          </div>
        );
      })()}

      {/* ── CHECKLIST MANGER BIEN ── */}
      {(() => {
        const EAT_ITEMS = [
          { key:"slow",   emoji:"🐢", label:"Mangé lentement (≥20 mastications)" },
          { key:"noscreen", emoji:"🚫", label:"Sans écran pendant les repas" },
          { key:"walk",   emoji:"🚶‍♀️", label:"Marche 10-15 min après le repas" },
          { key:"nodrink", emoji:"💧", label:"Peu d'eau pendant le repas" },
          { key:"relax",  emoji:"😮‍💨", label:"Repas détendu, sans stress" },
        ];
        const eatData = day.eatWell || {};
        const eatDone = EAT_ITEMS.filter(it => eatData[it.key]).length;
        const [open, setOpen] = React.useState(false);
        return (
          <div style={{ marginBottom:16 }}>
            <button onClick={()=>setOpen(o=>!o)}
              style={{ width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 18px",background:open?"#1A1410":"white",border:"1.5px solid "+(open?"#1A1410":"#E8DDD0"),borderRadius:open?"14px 14px 0 0":14,cursor:"pointer",fontFamily:"inherit",transition:"all 0.2s" }}>
              <div style={{ display:"flex",alignItems:"center",gap:10 }}>
                <span style={{ fontSize:17 }}>🍽️</span>
                <div style={{ textAlign:"left" }}>
                  <div style={{ fontSize:13,fontWeight:600,color:open?"#F5F0E8":"#1A1410" }}>Comment j'ai mangé</div>
                  <div style={{ fontSize:11,color:"#9B8B7E",marginTop:1 }}>Digestion & pleine conscience</div>
                </div>
              </div>
              <div style={{ display:"flex",alignItems:"center",gap:8 }}>
                {eatDone > 0 && <span style={{ fontSize:11,fontWeight:600,color:"#7A9E7E",background:"#F0FAF0",borderRadius:20,padding:"2px 8px" }}>{eatDone}/{EAT_ITEMS.length}</span>}
                <span style={{ fontSize:16,color:open?"#C4724A":"#9B8B7E",transition:"transform 0.2s",display:"inline-block",transform:open?"rotate(180deg)":"rotate(0deg)" }}>›</span>
              </div>
            </button>
            {open && (
              <div style={{ background:"white",border:"1.5px solid #1A1410",borderTop:"none",borderRadius:"0 0 14px 14px",padding:"8px 0" }}>
                {EAT_ITEMS.map((it,idx) => {
                  const checked = !!eatData[it.key];
                  return (
                    <button key={it.key} onClick={()=>updDay(d=>{ if(!d.eatWell) d.eatWell={}; d.eatWell[it.key]=!checked; })}
                      style={{ width:"100%",display:"flex",alignItems:"center",gap:12,padding:"11px 18px",background:checked?"#F0FAF0":"transparent",border:"none",borderBottom:idx<EAT_ITEMS.length-1?"1px solid #F5F0E8":"none",cursor:"pointer",fontFamily:"inherit",transition:"background 0.15s" }}>
                      <span style={{ fontSize:18 }}>{it.emoji}</span>
                      <span style={{ flex:1,fontSize:13,color:"#1A1410",textAlign:"left" }}>{it.label}</span>
                      <span style={{ fontSize:16,color:checked?"#7A9E7E":"#E8DDD0" }}>{checked?"✓":"○"}</span>
                    </button>
                  );
                })}
              </div>
            )}
          </div>
        );
      })()}

      {/* ── BILAN 80/20 compact ── */}
      <div style={{ background:"white",borderRadius:14,border:"1px solid #E8DDD0",padding:"13px 18px",marginBottom:16 }}>
        <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10 }}>
          <div style={{ fontSize:12,fontWeight:700,color:"#1A1410" }}>Équilibre de la semaine</div>
          {ratio!==null && (
            <div style={{ fontSize:12,fontWeight:700,color:ratio>=75?"#7A9E7E":ratio>=50?"#C9A84C":"#C4724A",background:(ratio>=75?"#F0FAF0":ratio>=50?"#FEF9EC":"#FEF3ED"),borderRadius:20,padding:"3px 10px" }}>
              {ratio}% équilibré
            </div>
          )}
        </div>
        <div style={{ display:"flex",gap:5,marginBottom:filled>0?8:0 }}>
          {days80.map((v,i)=>{
            const isT=last7()[i]===todayKey();
            return (
              <div key={i} style={{ flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3 }}>
                <div style={{ width:"100%",height:6,borderRadius:3,background:v?colMap[v]:"#F5F0E8",opacity:isT?1:0.7 }}/>
                <div style={{ fontSize:8,color:isT?"#C4724A":"#9B8B7E",fontWeight:isT?700:400 }}>{DAYS_SHORT[i]}</div>
              </div>
            );
          })}
        </div>
        {filled===0 && <div style={{ fontSize:11,color:"#C8BEB5",fontStyle:"italic",textAlign:"center",marginTop:4 }}>Évalue tes repas pour voir l'équilibre</div>}
        {filled>0 && (
          <div style={{ display:"flex",gap:10,justifyContent:"center" }}>
            {[{c:"#7A9E7E",n:greens,l:"🟢 équil."},{c:"#C9A84C",n:yellows,l:"🟡 mitigé"},{c:"#E05252",n:reds,l:"🔴 plaisir"}].filter(x=>x.n>0).map(x=>(
              <span key={x.l} style={{ fontSize:11,color:"#9B8B7E" }}>{x.n}j {x.l}</span>
            ))}
          </div>
        )}
      </div>

      {/* ── TOGGLE VUE ── */}
      <div style={{ display:"flex",gap:8,marginBottom:14 }}>
        {[
          { id:"semaine", label:"🗓 Vue semaine", desc:"Planifier" },
          { id:"jour",    label:"📋 Vue jour",    desc:"Suivre" },
        ].map(v=>(
          <button key={v.id} onClick={()=>setAlimView(v.id)}
            style={{ flex:1,padding:"10px 12px",borderRadius:12,border:"1.5px solid "+(alimView===v.id?"#1A1410":"#E8DDD0"),background:alimView===v.id?"#1A1410":"white",cursor:"pointer",fontFamily:"inherit",transition:"all 0.15s",textAlign:"center" }}>
            <div style={{ fontSize:12,fontWeight:600,color:alimView===v.id?"white":"#1A1410" }}>{v.label}</div>
            <div style={{ fontSize:10,color:alimView===v.id?"#9B8B7E":"#C8BEB5",marginTop:2 }}>{v.desc}</div>
          </button>
        ))}
      </div>

      {/* ── VUE SEMAINE — grille compacte ── */}
      {alimView==="semaine" && (
        <div style={{ background:"white",borderRadius:14,border:"1px solid #E8DDD0",overflow:"hidden" }}>
          <div style={{ display:"grid",gridTemplateColumns:"44px 1fr 1fr",background:"#FAFAF8",borderBottom:"1px solid #F0EBE3" }}>
            <div/>
            {["🍽 Déjeuner","🌙 Dîner"].map(h=>(
              <div key={h} style={{ padding:"7px 10px",fontSize:10,fontWeight:700,letterSpacing:"1px",textTransform:"uppercase",color:"#9B8B7E",borderLeft:"1px solid #F0EBE3" }}>{h}</div>
            ))}
          </div>
          {DAYS_FULL.map((dayName,i)=>{
            const d = new Date(curWeekMon+"T12:00:00"); d.setDate(d.getDate()+i);
            const iso = d.toISOString().slice(0,10);
            const dm  = getMenu(iso);
            const isT = iso===todayKey();
            const lunchSugg  = pastEntries("lunch");
            const dinnerSugg = pastEntries("dinner");
            return (
              <div key={iso} style={{ display:"grid",gridTemplateColumns:"44px 1fr 1fr",borderBottom:i<6?"1px solid #F5F0E8":"none",background:isT?"#FFFBF7":"white" }}>
                <div style={{ padding:"8px 4px 8px 12px",display:"flex",flexDirection:"column",justifyContent:"center" }}>
                  <div style={{ fontSize:9,fontWeight:700,letterSpacing:"1px",textTransform:"uppercase",color:isT?"#C4724A":"#9B8B7E" }}>{DAYS_SHORT[i]}</div>
                  <div style={{ fontSize:13,fontWeight:600,color:isT?"#C4724A":"#1A1410" }}>{d.getDate()}</div>
                </div>
                {[["lunch",lunchSugg],["dinner",dinnerSugg]].map(([slot,sugg])=>{
                  const val = dm[slot]||"";
                  const bal = dm[slot==="lunch"?"lunchBalance":"dinnerBalance"]||null;
                  const listId = "plan-"+iso+"-"+slot;
                  return (
                    <div key={slot} style={{ padding:"6px 10px",borderLeft:"1px solid #F5F0E8",display:"flex",alignItems:"center",gap:4 }}>
                      <datalist id={listId}>{sugg.map((s,j)=><option key={j} value={s}/>)}</datalist>
                      <input list={listId} value={val} onChange={e=>updMenu(iso,slot,e.target.value)} placeholder="..."
                        style={{ flex:1,border:"none",background:"transparent",fontFamily:"inherit",fontSize:12,color:"#1A1410",outline:"none",padding:"2px 0",minWidth:0 }} />
                      {bal && <span style={{ fontSize:11,flexShrink:0 }}>{balMap[bal]}</span>}
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      )}

      {/* ── VUE JOUR — accordéon ── */}
      {alimView==="jour" && (
        <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
          {DAYS_FULL.map((dayName,i) => {
            const d = new Date(curWeekMon+"T12:00:00"); d.setDate(d.getDate()+i);
            const iso    = d.toISOString().slice(0,10);
            const dm     = getMenu(iso);
            const isT    = iso===todayKey();
            const isOpen = expandedDay===iso;
            const lunchSnap  = dm.lunch||"";
            const dinnerSnap = dm.dinner||"";
            const lunchBal   = dm.lunchBalance;
            const dinnerBal  = dm.dinnerBalance;
            const hasData    = lunchSnap||dinnerSnap||lunchBal||dinnerBal;

            return (
              <div key={iso} style={{ background:"white",borderRadius:14,border:isT?"2px solid #C4724A":"1px solid #E8DDD0",overflow:"hidden" }}>
                <div onClick={()=>setExpandedDay(isOpen?null:iso)}
                  style={{ padding:"12px 16px",display:"flex",alignItems:"center",gap:10,cursor:"pointer",background:isT?"#FFFBF7":"white" }}>
                  <div style={{ width:40,height:40,borderRadius:11,background:isT?"#1A1410":"#F5F0E8",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0 }}>
                    <div style={{ fontSize:8,fontWeight:700,letterSpacing:"1px",textTransform:"uppercase",color:isT?"#C4724A":"#9B8B7E" }}>{DAYS_SHORT[i]}</div>
                    <div style={{ fontSize:14,fontWeight:700,color:isT?"white":"#1A1410",lineHeight:1.2 }}>{d.getDate()}</div>
                  </div>
                  <div style={{ flex:1,minWidth:0 }}>
                    {hasData ? (
                      <div style={{ display:"flex",flexDirection:"column",gap:2 }}>
                        {lunchSnap && <div style={{ fontSize:12,color:"#1A1410",display:"flex",alignItems:"center",gap:5 }}>
                          <span style={{ fontSize:11 }}>🍽</span>
                          <span style={{ overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1 }}>{lunchSnap}</span>
                          {lunchBal && <span style={{ fontSize:11,flexShrink:0 }}>{balMap[lunchBal]}</span>}
                        </div>}
                        {dinnerSnap && <div style={{ fontSize:12,color:"#1A1410",display:"flex",alignItems:"center",gap:5 }}>
                          <span style={{ fontSize:11 }}>🌙</span>
                          <span style={{ overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1 }}>{dinnerSnap}</span>
                          {dinnerBal && <span style={{ fontSize:11,flexShrink:0 }}>{balMap[dinnerBal]}</span>}
                        </div>}
                        {!lunchSnap && !dinnerSnap && <div style={{ fontSize:12,color:"#C8BEB5",fontStyle:"italic" }}>Repas à compléter</div>}
                      </div>
                    ) : (
                      <div style={{ fontSize:12,color:"#C8BEB5",fontStyle:"italic" }}>{isT?"Qu'est-ce que tu manges aujourd'hui ?":"Journée vide"}</div>
                    )}
                  </div>
                  <span style={{ fontSize:13,color:"#C8BEB5",flexShrink:0 }}>{isOpen?"▲":"▼"}</span>
                </div>

                {isOpen && (
                  <div style={{ borderTop:"1px solid #F5F0E8" }}>
                    {[
                      { slot:"lunch", realSlot:"lunchReal", balKey:"lunchBalance", emoji:"🍽", label:"Déjeuner" },
                      { slot:"dinner", realSlot:"dinnerReal", balKey:"dinnerBalance", emoji:"🌙", label:"Dîner" },
                    ].map(({slot,realSlot,balKey,emoji,label},ri) => {
                      const planned   = dm[slot]||"";
                      const realVal   = dm[realSlot]||"";
                      const bal       = dm[balKey]||null;
                      const asPlanned = dm[balKey+"_ok"]===true;
                      const sugg      = pastEntries(slot);
                      const realSugg  = pastEntries(realSlot);
                      const listIdP   = "dlv-"+iso+"-"+slot;
                      const listIdR   = "dlv-"+iso+"-"+realSlot;
                      return (
                        <div key={slot} style={{ padding:"12px 16px",borderTop:ri>0?"1px solid #F5F0E8":"none" }}>
                          <div style={{ display:"flex",alignItems:"center",gap:6,marginBottom:8 }}>
                            <span style={{ fontSize:14 }}>{emoji}</span>
                            <span style={{ fontSize:11,fontWeight:700,color:"#6B4F3A",textTransform:"uppercase",letterSpacing:"1px" }}>{label}</span>
                            {bal && <span style={{ marginLeft:"auto",fontSize:14 }}>{balMap[bal]}</span>}
                          </div>
                          <div style={{ marginBottom:8 }}>
                            <div style={{ fontSize:9,color:"#B0A090",textTransform:"uppercase",letterSpacing:"1px",marginBottom:4 }}>Prévu</div>
                            <datalist id={listIdP}>{sugg.map((s,j)=><option key={j} value={s}/>)}</datalist>
                            <input list={listIdP} value={planned} onChange={e=>updMenu(iso,slot,e.target.value)}
                              placeholder="Qu'est-ce que tu prévois ?"
                              style={{ width:"100%",border:"none",borderBottom:"1px solid #EDE8E0",background:"transparent",fontFamily:"inherit",fontSize:13,color:"#1A1410",outline:"none",padding:"4px 0" }} />
                          </div>
                          <div>
                            <div style={{ fontSize:9,color:"#B0A090",textTransform:"uppercase",letterSpacing:"1px",marginBottom:6 }}>Réel</div>
                            <div style={{ display:"flex",gap:6,marginBottom:6 }}>
                              <button onClick={()=>{ updMenu(iso,balKey+"_ok",true); if(realVal) updMenu(iso,realSlot,""); }}
                                style={{ padding:"5px 14px",borderRadius:20,border:"1.5px solid "+(asPlanned?"#7A9E7E":"#E8DDD0"),background:asPlanned?"#7A9E7E":"white",color:asPlanned?"white":"#9B8B7E",fontSize:11,cursor:"pointer",fontFamily:"inherit",fontWeight:600,transition:"all 0.15s" }}>
                                ✓ Comme prévu
                              </button>
                              <button onClick={()=>updMenu(iso,balKey+"_ok",false)}
                                style={{ padding:"5px 14px",borderRadius:20,border:"1.5px solid "+(asPlanned===false?"#C4724A":"#E8DDD0"),background:asPlanned===false?"#C4724A":"white",color:asPlanned===false?"white":"#9B8B7E",fontSize:11,cursor:"pointer",fontFamily:"inherit",fontWeight:600,transition:"all 0.15s" }}>
                                ✗ Autre chose
                              </button>
                            </div>
                            {asPlanned===false && (
                              <div style={{ marginBottom:6 }}>
                                <datalist id={listIdR}>{realSugg.map((s,j)=><option key={j} value={s}/>)}</datalist>

                              </div>
                            )}
                            {(asPlanned===true||asPlanned===false) && (
                              <div style={{ display:"flex",gap:6,alignItems:"center",marginTop:4 }}>
                                <span style={{ fontSize:10,color:"#9B8B7E" }}>Évaluation :</span>
                                {["green","yellow","red"].map(v=>(
                                  <button key={v} onClick={()=>updMenu(iso,balKey,bal===v?null:v)}
                                    style={{ fontSize:15,padding:"2px 6px",borderRadius:20,border:"1.5px solid "+(bal===v?"#1A1410":"transparent"),background:bal===v?"#F5F0E8":"transparent",cursor:"pointer",opacity:bal&&bal!==v?0.4:1,transition:"all 0.15s" }}>
                                    {balMap[v]}
                                  </button>
                                ))}
                              </div>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

    </div>
  );
}

  const streakEmoji = streakVal>=14?"🔥🔥":streakVal>=7?"🔥":streakVal>=1?"⚡":"";

      <div style={{ background:"white",borderRadius:16,border:"1px solid #E8DDD0",padding:"4px 0" }}>

                <span style={{ fontSize:13,color:checked?"#9B8B7E":"#1A1410",textDecoration:checked?"line-through":"none" }}>{it.label}</span>

      const data = d[routineKey] || {};

// ── SPORT TAB ──────────────────────────────────────────────────────────────────
const SportTab = ({ store, setStore, day, updDay, isToday }) => {
  const [monday,     setMonday]     = useState(getMonday());
  const [modal,      setModal]      = useState(null);
  const [subView,    setSubView]    = useState("week"); // "week" | "template"
  const [editingDay, setEditingDay] = useState(null);
  const [editGoals,  setEditGoals]  = useState(false);

  const wKey          = weekKey(monday);
  const isCurrentWeek = weekKey(getMonday()) === wKey;
  const today         = todayDayIdx();

  // NO auto-apply — show prompt instead
  const weekExists = !!store?.sport?.weeks?.[wKey];

  const weekData  = store?.sport?.weeks?.[wKey] || {};
  const updSport  = (fn) => setStore(prev => { const next=JSON.parse(JSON.stringify(prev)); fn(next.sport); return next; });

  const allSessions     = Object.values(weekData).flat();
  const statDone        = allSessions.filter(s=>s.status==="done").length;
  const statMissed      = allSessions.filter(s=>s.status==="missed").length;

  // ── weekly goals ─────────────────────────────────────────────────────────────
  const DEFAULT_GOALS   = { sessions:4, steps:70000 };
  const weekGoals       = store?.sport?.weekGoals?.[wKey] || DEFAULT_GOALS;
  const weekStepsTotal  = Array.from({length:7},(_,i)=>{
    const d=new Date(monday); d.setDate(d.getDate()+i);
    return store.days[d.toISOString().slice(0,10)]?.steps||0;
  }).reduce((a,b)=>a+b,0);
  const sessionsReached = statDone >= weekGoals.sessions;
  const stepsReached    = weekStepsTotal >= weekGoals.steps;
  const sessionsPct     = Math.min(statDone/(weekGoals.sessions||1),1);
  const stepsPct        = Math.min(weekStepsTotal/(weekGoals.steps||1),1);
  const updGoals = (vals) => setStore(prev=>{
    const next=JSON.parse(JSON.stringify(prev));
    if(!next.sport.weekGoals) next.sport.weekGoals={};
    next.sport.weekGoals[wKey]={...DEFAULT_GOALS,...(next.sport.weekGoals[wKey]||{}),...vals};
    return next;
  });

  const saveModal = (vals) => {
    updSport(s=>{
      if(modal.isTemplate){
        if(!s.template[modal.dayIdx]) s.template[modal.dayIdx]=[];
        if(modal.session){ const idx=s.template[modal.dayIdx].findIndex(x=>x.id===modal.session.id); if(idx>=0) s.template[modal.dayIdx][idx]={...modal.session,...vals}; }
        else s.template[modal.dayIdx].push({id:`t${Date.now()}`,...vals});
      } else {
        if(!s.weeks[wKey]) s.weeks[wKey]={};
        if(!s.weeks[wKey][modal.dayIdx]) s.weeks[wKey][modal.dayIdx]=[];
        if(modal.session){ const idx=s.weeks[wKey][modal.dayIdx].findIndex(x=>x.id===modal.session.id); if(idx>=0) s.weeks[wKey][modal.dayIdx][idx]={...modal.session,...vals}; }
        else s.weeks[wKey][modal.dayIdx].push(newSession(vals.type,vals.hour,vals.subtype,vals.km));
      }
    });
    setModal(null);
  };
  const deleteModal = () => {
    updSport(s=>{
      if(modal.isTemplate) s.template[modal.dayIdx]=(s.template[modal.dayIdx]||[]).filter(x=>x.id!==modal.session.id);
      else s.weeks[wKey][modal.dayIdx]=(s.weeks[wKey][modal.dayIdx]||[]).filter(x=>x.id!==modal.session.id);
    });
    setModal(null);
  };

  return (
    <div>
      {/* ── NAV ── */}
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10 }}>
        <div style={{ display:"flex",alignItems:"center",gap:8 }}>
          <button onClick={()=>{const m=new Date(monday);m.setDate(m.getDate()-7);setMonday(m);}}
            style={{ background:"white",border:"1.5px solid #E8DDD0",borderRadius:9,padding:"6px 11px",cursor:"pointer",fontSize:14,color:"#9B8B7E" }}>‹</button>
          <span style={{ fontSize:13,fontWeight:500 }}>
            {isCurrentWeek?<span style={{ color:"#C4724A" }}>Cette semaine</span>:null}
            <span style={{ fontSize:11,color:"#9B8B7E" }}>{isCurrentWeek?" · ":""}{fmtWeekRange(monday)}</span>
          </span>
          <button onClick={()=>{const m=new Date(monday);m.setDate(m.getDate()+7);setMonday(m);}}
            style={{ background:"white",border:"1.5px solid #E8DDD0",borderRadius:9,padding:"6px 11px",cursor:"pointer",fontSize:14,color:"#9B8B7E" }}>›</button>
          {!isCurrentWeek&&<button onClick={()=>setMonday(getMonday())} style={{ background:"#C4724A",border:"none",borderRadius:9,padding:"6px 11px",color:"white",cursor:"pointer",fontSize:11,fontFamily:"inherit",fontWeight:500 }}>Auj.</button>}
        </div>
        <button onClick={()=>setSubView(subView==="week"?"template":"week")}
          style={{ background:subView==="template"?"#FEF9EC":"white",border:`1.5px solid ${subView==="template"?"#C9A84C":"#E8DDD0"}`,borderRadius:9,padding:"6px 12px",cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:500,color:subView==="template"?"#C9A84C":"#9B8B7E" }}>
          {subView==="template"?"← Planning":"🗂 Mon modèle"}
        </button>
      </div>

      {/* ── EMPTY WEEK PROMPT (no auto-apply) ── */}
      {subView==="week" && !weekExists && (
        <div style={{ background:"#FEF9EC",border:"1.5px solid #F5D97A",borderRadius:14,padding:"18px 20px",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap" }}>
          <div>
            <div style={{ fontSize:13,fontWeight:600,color:"#6B4F3A",marginBottom:3 }}>Nouvelle semaine 🌱</div>
            <div style={{ fontSize:12,color:"#9B8B7E" }}>Appliquer ton modèle ou partir de zéro ?</div>
          </div>
          <div style={{ display:"flex",gap:8 }}>
            <button onClick={()=>updSport(s=>{if(!s.weeks[wKey])s.weeks[wKey]=applyTemplate(s.template);})}
              style={{ background:"#C9A84C",border:"none",borderRadius:10,padding:"8px 14px",color:"white",fontSize:12,cursor:"pointer",fontFamily:"inherit",fontWeight:500 }}>
              Appliquer le modèle
            </button>
            <button onClick={()=>updSport(s=>{if(!s.weeks[wKey])s.weeks[wKey]={0:[],1:[],2:[],3:[],4:[],5:[],6:[]};})}
              style={{ background:"white",border:"1.5px solid #E8DDD0",borderRadius:10,padding:"8px 14px",color:"#9B8B7E",fontSize:12,cursor:"pointer",fontFamily:"inherit" }}>
              Semaine vide
            </button>
          </div>
        </div>
      )}

      {/* ── OBJECTIFS + STATS FUSIONNÉS ── */}
      {subView==="week" && weekExists && (
        <div style={{ background:"white",borderRadius:16,border:"1px solid #E8DDD0",padding:"14px 18px",marginBottom:16 }}>
          <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12 }}>
            <div style={{ display:"flex",alignItems:"center",gap:7 }}>
              <span style={{ fontSize:15 }}>🎯</span>
              <span style={{ fontSize:13,fontWeight:600 }}>Objectifs · semaine</span>
            </div>
            <div style={{ display:"flex",alignItems:"center",gap:8 }}>
              {/* mini stats */}
              <span style={{ fontSize:11,color:"#9B8B7E" }}>{statDone} faites · {statMissed} ratées</span>
              <button onClick={()=>setEditGoals(!editGoals)}
                style={{ background:editGoals?"#1A1410":"#F5F0E8",border:"none",borderRadius:8,padding:"4px 10px",fontSize:11,cursor:"pointer",color:editGoals?"white":"#9B8B7E",fontFamily:"inherit",fontWeight:500,transition:"all 0.15s" }}>
                {editGoals?"✓ OK":"✏️"}
              </button>
            </div>
          </div>

          <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
            {/* Séances */}
            <div>
              <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5 }}>
                <div style={{ display:"flex",alignItems:"center",gap:5 }}>
                  <span style={{ fontSize:13 }}>💪</span>
                  <span style={{ fontSize:12,fontWeight:500 }}>Séances</span>
                </div>
                <div style={{ display:"flex",alignItems:"center",gap:5 }}>
                  <span style={{ fontSize:13,fontWeight:700,color:sessionsReached?"#7A9E7E":"#1A1410" }}>{statDone}</span>
                  <span style={{ fontSize:11,color:"#9B8B7E" }}>/</span>
                  {editGoals
                    ? <input type="number" min="1" max="14" value={weekGoals.sessions} onChange={e=>updGoals({sessions:Math.max(1,parseInt(e.target.value)||1)})}
                        style={{ width:36,border:"1.5px solid #E8DDD0",borderRadius:6,padding:"2px 6px",fontFamily:"inherit",fontSize:12,textAlign:"center",outline:"none" }} />
                    : <span style={{ fontSize:11,color:"#9B8B7E" }}>{weekGoals.sessions}</span>

                <div style={{ display:"flex",alignItems:"center",gap:5 }}>
                  <span style={{ fontSize:13 }}>🚶‍♀️</span>
                  <span style={{ fontSize:12,fontWeight:500 }}>Pas</span>
                </div>
                <div style={{ display:"flex",alignItems:"center",gap:5 }}>
                  <span style={{ fontSize:13,fontWeight:700,color:stepsReached?"#7A9E7E":"#1A1410" }}>{weekStepsTotal.toLocaleString("fr-FR")}</span>
                  <span style={{ fontSize:11,color:"#9B8B7E" }}>/</span>
                  {editGoals
                    ? <input type="number" min="1000" step="5000" value={weekGoals.steps} onChange={e=>updGoals({steps:Math.max(1000,parseInt(e.target.value)||1000)})}
                        style={{ width:68,border:"1.5px solid #E8DDD0",borderRadius:6,padding:"2px 6px",fontFamily:"inherit",fontSize:12,textAlign:"center",outline:"none" }} />

                </div>
              </div>
              <div style={{ height:5,background:"#F5F0E8",borderRadius:20,overflow:"hidden" }}>
                <div style={{ height:"100%",width:`${stepsPct*100}%`,background:stepsReached?"#7A9E7E":"#C9A84C",borderRadius:20,transition:"width 0.4s ease" }} />
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── TEMPLATE VIEW ── */}
      {subView==="template" && (
        <div>
          <div style={{ background:"#FEF9EC",border:"1.5px solid #F5D97A",borderRadius:12,padding:"11px 16px",marginBottom:16,fontSize:12,color:"#6B4F3A",display:"flex",gap:8 }}>
            <span>💡</span><span>Ton modèle de base — appliqué à la demande chaque nouvelle semaine.</span>
          </div>
          <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
            {DAYS_FULL.map((dayName,i)=>(
              <div key={i} style={{ background:"white",borderRadius:14,padding:"14px 18px",border:"1px solid #E8DDD0" }}>
                <div style={{ display:"flex",alignItems:"center",gap:10,marginBottom:(store.sport.template[i]||[]).length>0?10:0 }}>
                  <span style={{ fontSize:11,fontWeight:700,color:"#9B8B7E",width:32 }}>{DAYS_SHORT[i]}</span>
                  <span style={{ flex:1,fontSize:13,fontWeight:500 }}>{dayName}</span>
                  <button onClick={()=>setModal({dayIdx:i,session:null,isTemplate:true})}
                    style={{ background:"#F5F0E8",border:"none",borderRadius:7,padding:"4px 9px",fontSize:11,cursor:"pointer",color:"#9B8B7E",fontFamily:"inherit" }}>+ Ajouter</button>
                </div>
                <div style={{ display:"flex",flexDirection:"column",gap:6 }}>
                  {(store.sport.template[i]||[]).map(s=>(
                    <SessionRow key={s.id} session={s} onClick={()=>setModal({dayIdx:i,session:s,isTemplate:true})} />
                  ))}
                  {(store.sport.template[i]||[]).length===0&&<span style={{ fontSize:12,color:"#E8DDD0",paddingLeft:4 }}>Repos</span>}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── WEEK LIST VIEW ── */}
      {subView==="week" && weekExists && (
        <div>
          <div style={{ display:"flex",justifyContent:"flex-end",marginBottom:10 }}>
            <button onClick={()=>updSport(s=>{s.weeks[wKey]=applyTemplate(s.template);})}
              style={{ background:"white",border:"1.5px solid #E8DDD0",borderRadius:9,padding:"6px 12px",fontSize:11,cursor:"pointer",color:"#9B8B7E",fontFamily:"inherit" }}>
              ↺ Réappliquer le modèle
            </button>
          </div>

          <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
            {DAYS_FULL.map((dayName,i)=>{
              const sessions  = weekData[i]||[];
              const isToday_  = isCurrentWeek && i===today;
              const isPast    = isCurrentWeek && i<today;
              const dateNum   = (()=>{ const d=new Date(monday); d.setDate(d.getDate()+i); return d.getDate(); })();
              const hasDone   = sessions.some(s=>s.status==="done");
              const allDone   = sessions.length>0 && sessions.filter(s=>s.type!=="rest").every(s=>s.status==="done");

              const dayIso   = (()=>{ const d=new Date(monday); d.setDate(d.getDate()+i); return d.toISOString().slice(0,10); })();
              const daySteps = store.days[dayIso]?.steps||0;
              const GOAL     = 10000;
              const stepsPct = Math.min(daySteps/GOAL,1);
              const stepsCol = daySteps>=GOAL?"#7A9E7E":daySteps>=6000?"#C9A84C":daySteps>0?"#C4724A":"#E8DDD0";
              const updStepsInline = (val) => setStore(prev=>{
                const next=JSON.parse(JSON.stringify(prev));
                if(!next.days[dayIso]) next.days[dayIso]=EMPTY_DAY();
                next.days[dayIso].steps=Math.max(0,val);
                return next;
              });

              return (
                <div key={i} style={{ background:"white",borderRadius:16,border:isToday_?"2px solid #C4724A":"1.5px solid #E8DDD0",overflow:"hidden",opacity:isPast&&!hasDone&&!daySteps?0.7:1,transition:"all 0.15s" }}>
                  {/* Day header */}
                  <div style={{ padding:"12px 16px",display:"flex",alignItems:"center",gap:10,borderBottom:"1px solid #F5F0E8" }}>
                    <div style={{ width:42,height:42,borderRadius:12,background:isToday_?"#1A1410":allDone?"#F0FAF0":"#F5F0E8",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0 }}>
                      <div style={{ fontSize:9,fontWeight:700,letterSpacing:"1px",textTransform:"uppercase",color:isToday_?"#C4724A":allDone?"#7A9E7E":"#9B8B7E" }}>{DAYS_SHORT[i]}</div>
                      <div style={{ fontSize:15,fontWeight:700,color:isToday_?"white":allDone?"#7A9E7E":"#1A1410",lineHeight:1.2 }}>{dateNum}</div>
                    </div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:13,fontWeight:600,color:isToday_?"#C4724A":"#1A1410" }}>
                        {dayName}
                        {isToday_&&<span style={{ fontSize:10,background:"#C4724A",color:"white",borderRadius:20,padding:"1px 7px",marginLeft:7,fontWeight:600 }}>Aujourd'hui</span>}
                      </div>
                      <div style={{ fontSize:11,color:"#9B8B7E",marginTop:1 }}>
                        {sessions.length===0?"Repos":sessions.length===1?"1 séance":`${sessions.length} séances`}
                        {sessions.filter(s=>s.status==="done").length>0&&<span style={{ color:"#7A9E7E",marginLeft:5 }}>· {sessions.filter(s=>s.status==="done").length} faite{sessions.filter(s=>s.status==="done").length>1?"s":""}</span>}
                      </div>
                    </div>
                    <button onClick={()=>setModal({dayIdx:i,session:null,isTemplate:false})}
                      style={{ background:"#F5F0E8",border:"none",borderRadius:9,padding:"6px 12px",fontSize:12,cursor:"pointer",color:"#9B8B7E",fontFamily:"inherit",fontWeight:500,transition:"all 0.15s",flexShrink:0 }}
                      onMouseEnter={e=>{e.currentTarget.style.background="#E8DDD0";}}
                      onMouseLeave={e=>{e.currentTarget.style.background="#F5F0E8";}}>
                      + Séance
                    </button>
                  </div>
                  {/* Sessions list */}
                  {sessions.length>0 && (
                    <div style={{ padding:"8px 12px",display:"flex",flexDirection:"column",gap:6 }}>
                      {sessions.map(s=>(
                        <SessionRow key={s.id} session={s}
                          onClick={()=>setModal({dayIdx:i,session:s,isTemplate:false})}
                          onQuickDone={()=>updSport(sp=>{
                            const w=sp.weeks[wKey]; if(!w||!w[i]) return;
                            const idx=w[i].findIndex(x=>x.id===s.id);
                            if(idx<0) return;
                            w[i][idx].status = w[i][idx].status==="done" ? "planned" : "done";
                          })}
                        />
                      ))}
                    </div>
                  )}
                  {/* Steps inline */}
                  <div style={{ padding:"10px 16px",borderTop:"1px solid #F5F0E8",display:"flex",alignItems:"center",gap:10 }}>
                    <span style={{ fontSize:15 }}>🚶‍♀️</span>
                    <div style={{ flex:1 }}>
                      <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4 }}>
                        <div style={{ display:"flex",alignItems:"center",gap:6 }}>
                          <input
                            type="number" min="0" max="99999"
                            value={daySteps||""}
                            onChange={e=>updStepsInline(parseInt(e.target.value)||0)}
                            placeholder="Pas du jour..."
                            style={{ border:"none",background:"transparent",fontFamily:"inherit",fontSize:12,color:"#1A1410",outline:"none",width:90 }}
                          />
                          <span style={{ fontSize:11,color:"#9B8B7E" }}>/ 10 000</span>
                        </div>
                        <span style={{ fontSize:11,fontWeight:600,color:stepsCol }}>
                          {daySteps>=GOAL?"🎉 Objectif !":daySteps>0?`${Math.round(stepsPct*100)}%`:"—"}
                        </span>
                      </div>
                      <div style={{ height:4,background:"#F5F0E8",borderRadius:20,overflow:"hidden" }}>
                        <div style={{ height:"100%",width:`${stepsPct*100}%`,background:daySteps>=GOAL?"#7A9E7E":daySteps>=6000?"#C9A84C":daySteps>0?"#C4724A":"transparent",borderRadius:20,transition:"width 0.3s" }} />
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>


        </div>
      )}

            {modal&&<SessionModal session={modal.session} dayIdx={modal.dayIdx} isTemplate={modal.isTemplate} onClose={()=>setModal(null)} onSave={saveModal} onDelete={deleteModal} />}
    </div>
  );
};

// ── BILAN TAB ──────────────────────────────────────────────────────────────────
const BilanTab = ({ store }) => {
  const [period, setPeriod] = React.useState(30); // 30 or 7

  // Build last N days array
  const days = Array.from({ length: period }, (_, i) => {
    const d = new Date(); d.setDate(d.getDate() - (period - 1 - i));
    return d.toISOString().slice(0, 10);
  });

  // Score per day
  const scores = days.map(k => {
    const d   = store.days[k];
    const idx = (() => { const dd = new Date(k+"T12:00:00").getDay(); return dd===0?6:dd-1; })();
    const wk  = weekKey(getMonday(new Date(k+"T12:00:00")));
    const s   = calcScore(d, store.sport?.weeks?.[wk], idx, store);
    return { key:k, score:s, hasData:!!d };
  });

  const filled    = scores.filter(s => s.hasData);
  const avgScore  = filled.length ? Math.round(filled.reduce((a,b)=>a+b.score,0)/filled.length) : 0;
  const bestDay   = filled.length ? filled.reduce((a,b)=>a.score>b.score?a:b) : null;
  const daysOver75= filled.filter(s=>s.score>=75).length;

  // Sport stats
  const sportSessions = days.flatMap(k => {
    const idx = (() => { const dd=new Date(k+"T12:00:00").getDay(); return dd===0?6:dd-1; })();
    const wk  = weekKey(getMonday(new Date(k+"T12:00:00")));
    return (store.sport?.weeks?.[wk]?.[idx] || []).map(s=>({...s, date:k}));
  });
  const sportDone   = sportSessions.filter(s=>s.status==="done" && s.type!=="rest").length;
  const sportTypes  = sportSessions.filter(s=>s.status==="done" && s.type!=="rest").reduce((acc,s)=>{
    acc[s.type]=(acc[s.type]||0)+1; return acc;
  },{});
  const topSport    = Object.entries(sportTypes).sort((a,b)=>b[1]-a[1])[0];

  // Mood distribution
  const moodCounts = filled.reduce((acc, {key}) => {
    const mood = store.days[key]?.mood;
    if(mood) { acc[mood]=(acc[mood]||0)+1; }
    return acc;
  }, {});
  const topMood = Object.entries(moodCounts).sort((a,b)=>b[1]-a[1])[0];

  // Streak record (longest consecutive sport days in period)
  let maxStreak=0, curStreak=0;
  days.forEach(k=>{
    const idx=(() => { const dd=new Date(k+"T12:00:00").getDay(); return dd===0?6:dd-1; })();
    const wk=weekKey(getMonday(new Date(k+"T12:00:00")));
    const sessions=store.sport?.weeks?.[wk]?.[idx]||[];
    if(sessions.some(s=>s.status==="done"&&s.type!=="rest")){ curStreak++; maxStreak=Math.max(maxStreak,curStreak); }
    else curStreak=0;
  });

  // Self-care streak record
  const morningItems = store.morningItems || DEFAULT_MORNING;
  let scMaxStreak=0, scCur=0;
  days.forEach(k=>{
    const d=store.days[k];
    const morning=d?.morning||{};
    const done=morningItems.filter(it=>morning[it.key]).length;
    if(d && morningItems.length>0 && done/morningItems.length>=0.8){ scCur++; scMaxStreak=Math.max(scMaxStreak,scCur); }
    else scCur=0;
  });

  // Scores by week for sparkline
  const weekBuckets = [];
  for(let i=0;i<Math.ceil(period/7);i++){
    const wDays = days.slice(i*7,(i+1)*7);
    const wScores = wDays.map(k=>scores.find(s=>s.key===k)).filter(s=>s.hasData);
    if(wScores.length) weekBuckets.push(Math.round(wScores.reduce((a,b)=>a+b.score,0)/wScores.length));
    else weekBuckets.push(0);
  }

  const sc = scoreColor(avgScore);

  return (
    <div>
      {/* Period toggle */}
      <div style={{ display:"flex",gap:8,marginBottom:20 }}>
        {[7,30].map(p=>(
          <button key={p} onClick={()=>setPeriod(p)}
            style={{ flex:1,padding:"9px",borderRadius:12,border:"1.5px solid "+(period===p?"#1A1410":"#E8DDD0"),background:period===p?"#1A1410":"white",color:period===p?"white":"#9B8B7E",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",transition:"all 0.15s" }}>
            {p===7?"7 derniers jours":"30 derniers jours"}
          </button>
        ))}
      </div>

      {/* Score moyen hero */}
      <div style={{ background:"#1A1410",borderRadius:20,padding:"22px 24px",marginBottom:16,position:"relative",overflow:"hidden" }}>
        <div style={{ position:"absolute",top:-30,right:-30,width:120,height:120,borderRadius:"50%",background:"#C4724A",opacity:0.12 }}/>
        <div style={{ fontSize:11,color:"#9B8B7E",letterSpacing:"2px",textTransform:"uppercase",marginBottom:12 }}>Score moyen sur {period} jours</div>
        <div style={{ display:"flex",alignItems:"flex-end",gap:16 }}>
          <div>
            <span style={{ fontFamily:"Georgia,serif",fontSize:52,fontWeight:700,color:sc,lineHeight:1 }}>{avgScore}</span>
            <span style={{ fontSize:16,color:"#9B8B7E",marginLeft:4 }}>%</span>
          </div>
          <div style={{ paddingBottom:8 }}>
            <div style={{ fontSize:13,color:"#F5F0E8",fontWeight:500 }}>{scoreLabel(avgScore)}</div>
            <div style={{ fontSize:11,color:"#9B8B7E",marginTop:3 }}>{filled.length} jour{filled.length>1?"s":""} enregistré{filled.length>1?"s":""}</div>
          </div>
        </div>

        {/* Mini bar chart */}
        <div style={{ display:"flex",gap:3,marginTop:18,alignItems:"flex-end",height:48 }}>
          {scores.map(({key,score,hasData},i)=>{
            const isT=key===todayKey();
            const col=scoreColor(score);
            const h=hasData?Math.max((score/100)*44,4):4;
            return (
              <div key={key} style={{ flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2 }}>
                <div style={{ width:"100%",height:h,background:hasData?(isT?col:col+"77"):"rgba(255,255,255,0.08)",borderRadius:3,transition:"height 0.3s" }}/>
              </div>
            );
          })}
        </div>
        <div style={{ display:"flex",justifyContent:"space-between",marginTop:4 }}>
          <span style={{ fontSize:9,color:"#9B8B7E" }}>il y a {period-1}j</span>
          <span style={{ fontSize:9,color:"#C4724A",fontWeight:700 }}>aujourd'hui</span>
        </div>
      </div>

      {/* Stats grid */}
      <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16 }}>
        {[
          { emoji:"🌟", label:"Jours ≥75%", val:daysOver75, sub:`sur ${filled.length} jours`, col:"#C9A84C" },
          { emoji:"🔥", label:"Meilleur streak sport", val:maxStreak+"j", sub:maxStreak>=7?"Impressionnant !":"Continue !", col:"#C4724A" },
          { emoji:"💪", label:"Séances sport", val:sportDone, sub:topSport?`surtout ${getSport(topSport[0]).label}`:"cette période", col:"#7A9E7E" },
          { emoji:"🌅", label:"Streak routine", val:scMaxStreak+"j", sub:"morning ≥80%", col:"#9B7EC8" },
        ].map(item=>(
          <div key={item.label} style={{ background:"white",borderRadius:16,border:"1px solid #E8DDD0",padding:"14px 16px" }}>
            <div style={{ fontSize:20,marginBottom:6 }}>{item.emoji}</div>
            <div style={{ fontSize:22,fontWeight:700,color:item.col,fontFamily:"Georgia,serif",lineHeight:1 }}>{item.val}</div>
            <div style={{ fontSize:11,fontWeight:600,color:"#1A1410",marginTop:4 }}>{item.label}</div>
            <div style={{ fontSize:10,color:"#9B8B7E",marginTop:2 }}>{item.sub}</div>
          </div>
        ))}
      </div>

      {/* Meilleure journée */}
      {bestDay && (
        <div style={{ background:"white",borderRadius:16,border:"1px solid #E8DDD0",padding:"14px 18px",marginBottom:16,display:"flex",alignItems:"center",gap:14 }}>
          <div style={{ width:48,height:48,borderRadius:14,background:scoreColor(bestDay.score)+"22",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0 }}>
            <span style={{ fontSize:24 }}>🏆</span>
          </div>
          <div>
            <div style={{ fontSize:11,color:"#9B8B7E",textTransform:"uppercase",letterSpacing:"1.5px",marginBottom:3 }}>Meilleure journée</div>
            <div style={{ fontSize:14,fontWeight:700,color:"#1A1410" }}>{fmtFull(bestDay.key)}</div>
            <div style={{ fontSize:13,color:scoreColor(bestDay.score),fontWeight:600,marginTop:2 }}>{bestDay.score}% · {scoreLabel(bestDay.score)}</div>
          </div>
        </div>
      )}

      {/* Humeur dominante */}
      {topMood && (
        <div style={{ background:"white",borderRadius:16,border:"1px solid #E8DDD0",padding:"14px 18px",marginBottom:16 }}>
          <div style={{ fontSize:11,fontWeight:600,letterSpacing:"2px",textTransform:"uppercase",color:"#9B8B7E",marginBottom:12 }}>Humeurs sur {period} jours</div>
          <div style={{ display:"flex",gap:8,flexWrap:"wrap" }}>
            {MOODS.map(m=>{
              const cnt = moodCounts[m.label]||0;
              const pct = filled.length>0 ? Math.round((cnt/filled.length)*100) : 0;
              if(!cnt) return null;
              return (
                <div key={m.label} style={{ display:"flex",alignItems:"center",gap:6,background:m.color+"18",borderRadius:20,padding:"5px 12px" }}>
                  <span style={{ fontSize:15 }}>{m.emoji}</span>
                  <span style={{ fontSize:12,fontWeight:600,color:m.color }}>{cnt}×</span>
                  <span style={{ fontSize:11,color:"#9B8B7E" }}>{pct}%</span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Progression semaine par semaine */}
      {weekBuckets.length > 1 && (
        <div style={{ background:"white",borderRadius:16,border:"1px solid #E8DDD0",padding:"14px 18px" }}>
          <div style={{ fontSize:11,fontWeight:600,letterSpacing:"2px",textTransform:"uppercase",color:"#9B8B7E",marginBottom:12 }}>Évolution semaine par semaine</div>
          <div style={{ display:"flex",gap:8,alignItems:"flex-end",height:56 }}>
            {weekBuckets.map((avg,i)=>{
              const isLast=i===weekBuckets.length-1;
              const col=scoreColor(avg);
              return (
                <div key={i} style={{ flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4 }}>
                  <div style={{ fontSize:10,fontWeight:700,color:col }}>{avg||"·"}%</div>
                  <div style={{ width:"100%",height:Math.max((avg/100)*40,4),background:isLast?col:col+"77",borderRadius:6,transition:"height 0.3s" }}/>
                  <div style={{ fontSize:9,color:isLast?"#C4724A":"#9B8B7E",fontWeight:isLast?700:400 }}>S{i+1}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
};

// ── MAIN TRACKER ───────────────────────────────────────────────────────────────
