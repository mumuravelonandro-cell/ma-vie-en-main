// Extraire les repas uniques depuis le store tracker
const extractClassiques = async () => {
  try {
    const r = await window.storage.get(TRACKER_KEY);
    if (!r) return [];
    const tracker = JSON.parse(r.value);
    const menus = tracker.weekMenus || {};
    const names = new Set();
    Object.values(menus).forEach(week => {
      Object.values(week).forEach(day => {
        if (day.lunch)      names.add(day.lunch.trim());
        if (day.lunchReal)  names.add(day.lunchReal.trim());
        if (day.dinner)     names.add(day.dinner.trim());
        if (day.dinnerReal) names.add(day.dinnerReal.trim());
      });
    });
    return [...names].filter(Boolean).sort();
  } catch { return []; }
};

const load = async () => {
  try {
    // migrate v1 → v2 if needed
    const r1 = await window.storage.get("carnet_v1");
    const r2 = await window.storage.get(STORE_KEY);
    if (r2) return { ...DEFAULT_DATA, ...JSON.parse(r2.value) };
    if (r1) {
      const old = JSON.parse(r1.value);
      if (old.movies)   old.movies   = old.movies.map(m => ({ cat:"film", status: m.done?"vu":"à voir", notes:"", ...m }));
      if (old.podcasts) old.podcasts = old.podcasts.map(p => ({ status: p.done?"terminé":"à écouter", notes:"", ...p }));
      if (old.books)    old.books    = old.books.map(b => ({ rating:0, ...b }));
      if (old.goals)    old.goals    = old.goals.map(g => ({ doneAt:null, ...g }));
      return { ...DEFAULT_DATA, ...old };
    }
    return DEFAULT_DATA;
  } catch { return DEFAULT_DATA; }
};
const save = async (data) => { try { await window.storage.set(STORE_KEY, JSON.stringify(data)); } catch {} };

              const R_CATS   = ["Tout","Petit déj","Plat","Dessert","Snack","Boisson"];
              const R_STATUS = [
                { value:"à tester", label:"À tester", emoji:"🧪", bg:"#EFF6FF", border:"#BFDBFE", color:"#3B82F6" },
                { value:"testé",    label:"Testé",    emoji:"✓",  bg:"#FFF7ED", border:"#FED7AA", color:"#C4724A" },
                { value:"adopté",   label:"Adopté",   emoji:"🌟", bg:"#F0FDF4", border:"#BBF7D0", color:"#7A9E7E" },
              ];
              const R_TEMPS  = ["Rapide","Moyen","Long"];
              const adopted  = data.recipes.filter(r=>r.status==="adopté").length;
              const tested   = data.recipes.filter(r=>r.status==="testé").length;
              const toTest   = data.recipes.filter(r=>r.status==="à tester").length;

              // Tri
              const sortFn = (a,b) => {
                if(rSort==="note")  return (b.rating||0)-(a.rating||0);
                if(rSort==="nom")   return a.name.localeCompare(b.name);
                if(rSort==="temps") { const o=["Rapide","Moyen","Long",""];  return (o.indexOf(a.temps||"")||99)-(o.indexOf(b.temps||"")||99); }
                return 0; // ajout = ordre naturel
              };

              const pipeline = data.recipes
                .filter(r => r.status!=="adopté" &&
                  (filterText(r.name)||filterText(r.source||"")) &&
                  (rCat==="Tout"||(r.cat||"Plat")===rCat) &&
                  (rFilter==="tous"||r.status===rFilter))
                .sort(sortFn);

              const adoptees = data.recipes
                .filter(r => r.status==="adopté" &&
                  (filterText(r.name)||filterText(r.source||"")) &&
                  (rCat==="Tout"||(r.cat||"Plat")===rCat))
                .sort(sortFn);

              // helper carte recette
              const RecipeCard = (r) => (
                <CardShell key={r.id} active={expandedId===r.id} onClick={()=>toggle(r.id)}>
                  <div style={{ padding:"13px 16px",display:"flex",alignItems:"center",gap:12 }}>
                    <div style={{ flex:1,minWidth:0 }}>
                      <div style={{ fontSize:14,fontWeight:600,color:r.status==="adopté"?C.sage:C.dark }}>{r.name}</div>
                      <div style={{ display:"flex",gap:6,marginTop:3,flexWrap:"wrap",alignItems:"center" }}>
                        {r.source && <span style={{ fontSize:10,color:C.muted }}>📌 {r.source}</span>}
                        {r.cat && r.cat!=="Plat" && <span style={{ fontSize:10,background:C.cream,borderRadius:10,padding:"1px 7px",color:C.muted }}>{r.cat}</span>}
                        {r.temps && <span style={{ fontSize:10,background:"#FEF9EC",borderRadius:10,padding:"1px 7px",color:C.gold }}>⏱ {r.temps}</span>}
                        {r.rating>0 && <Stars value={r.rating||0} onChange={()=>{}} />}
                      </div>
                    </div>
                    <StatusPill value={r.status||"à tester"} options={R_STATUS} onChange={v=>upd(d=>{ d.recipes.find(x=>x.id===r.id).status=v; })} />
                  </div>
                  {expandedId===r.id && (
                    <div style={{ borderTop:`1px solid ${C.cream}`,padding:"12px 16px",background:C.light }} onClick={e=>e.stopPropagation()}>
                      <div style={{ display:"flex",gap:8,marginBottom:8,flexWrap:"wrap" }}>
                        <input value={r.source||""} onChange={e=>upd(d=>{ d.recipes.find(x=>x.id===r.id).source=e.target.value; })}
                          placeholder="Source : TikTok, livre, amie..."
                          style={{ flex:1,minWidth:140,border:`1.5px solid ${C.border}`,background:"white",borderRadius:10,padding:"8px 12px",fontFamily:"inherit",fontSize:12,color:C.dark,outline:"none" }} />
                        <select value={r.cat||"Plat"} onChange={e=>upd(d=>{ d.recipes.find(x=>x.id===r.id).cat=e.target.value; })}
                          style={{ flex:1,minWidth:110,border:`1.5px solid ${C.border}`,background:"white",borderRadius:10,padding:"8px 12px",fontFamily:"inherit",fontSize:12,color:C.dark,outline:"none",cursor:"pointer" }}>
                          {R_CATS.filter(c=>c!=="Tout").map(c=><option key={c} value={c}>{c}</option>)}
                        </select>
                      </div>
                      <div style={{ display:"flex",gap:8,marginBottom:8,flexWrap:"wrap" }}>
                        <select value={r.temps||""} onChange={e=>upd(d=>{ d.recipes.find(x=>x.id===r.id).temps=e.target.value; })}
                          style={{ flex:1,border:`1.5px solid ${C.border}`,background:"white",borderRadius:10,padding:"8px 12px",fontFamily:"inherit",fontSize:12,color:C.dark,outline:"none",cursor:"pointer" }}>
                          <option value="">⏱ Temps</option>
                          {R_TEMPS.map(t=><option key={t} value={t}>{t}</option>)}
                        </select>
                        <div style={{ flex:1,minWidth:130,display:"flex",gap:6,alignItems:"center" }}>
                        <input value={r.url||""} onChange={e=>upd(d=>{ d.recipes.find(x=>x.id===r.id).url=e.target.value; })}
                          placeholder="🔗 Lien"
                          style={{ flex:1,border:`1.5px solid ${C.border}`,background:"white",borderRadius:10,padding:"8px 12px",fontFamily:"inherit",fontSize:12,color:C.dark,outline:"none" }} />
                        {r.url && <a href={r.url} target="_blank" rel="noopener noreferrer"
                          style={{ flexShrink:0,background:C.dark,borderRadius:8,padding:"7px 10px",color:"white",fontSize:11,textDecoration:"none",fontWeight:600 }}
                          onClick={e=>e.stopPropagation()}>↗</a>}
                      </div>
                      </div>
                      {(r.status==="testé"||r.status==="adopté") && (
                        <div style={{ marginBottom:8 }}>
                          <div style={{ fontSize:11,fontWeight:700,color:C.muted,marginBottom:4,textTransform:"uppercase",letterSpacing:1 }}>Note</div>
                          <Stars value={r.rating||0} onChange={v=>upd(d=>{ d.recipes.find(x=>x.id===r.id).rating=v; })} />
                        </div>
                      )}
                      <textarea value={r.notes||""} onChange={e=>upd(d=>{ d.recipes.find(x=>x.id===r.id).notes=e.target.value; })}
                        placeholder="Notes, modifications, ce qui m'a plu..."
                        style={{ width:"100%",border:`1.5px solid ${C.border}`,background:"white",borderRadius:10,padding:"9px 12px",fontFamily:"inherit",fontSize:13,color:C.dark,resize:"none",outline:"none",minHeight:50,lineHeight:1.6 }} />
                      <button onClick={()=>upd(d=>{ d.recipes=d.recipes.filter(x=>x.id!==r.id); setExpId(null); })}
                        style={{ marginTop:8,fontSize:11,color:C.terra,background:"none",border:"none",cursor:"pointer",padding:0,fontFamily:"inherit" }}>Supprimer</button>
                    </div>
                  )}
                </CardShell>
              );

              return (
                <div>
                  {/* Stats */}
                  <div style={{ display:"flex",gap:8,marginBottom:16 }}>
                    {[[toTest,"🧪","à tester","#3B82F6"],[tested,"✓","testées","#C4724A"],[adopted,"🌟","adoptées","#7A9E7E"]].map(([n,e,l,c])=>(
                      <div key={l} style={{ flex:1,background:"white",borderRadius:12,border:`1.5px solid ${C.border}`,padding:"10px 8px",textAlign:"center" }}>
                        <div style={{ fontSize:18,fontWeight:700,color:c }}>{n}</div>
                        <div style={{ fontSize:10,color:C.muted,marginTop:1 }}>{e} {l}</div>
                      </div>
                    ))}
                  </div>

                  {/* Filtre catégorie */}
                  <div style={{ display:"flex",gap:6,overflowX:"auto",paddingBottom:6,marginBottom:8 }}>
                    {R_CATS.map(c=>(
                      <button key={c} onClick={()=>setRCat(c)}
                        style={{ flexShrink:0,border:`1.5px solid ${rCat===c?C.dark:C.border}`,background:rCat===c?C.dark:"white",borderRadius:20,padding:"5px 12px",fontSize:11,fontWeight:600,color:rCat===c?"white":C.muted,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap" }}>
                        {c}
                      </button>
                    ))}
                  </div>

                  {/* Tri */}
                  <div style={{ display:"flex",gap:6,marginBottom:16,alignItems:"center" }}>
                    <span style={{ fontSize:11,color:C.muted,flexShrink:0 }}>Trier :</span>
                    {[["ajout","Ajout"],["note","⭐ Note"],["nom","A→Z"],["temps","⏱ Temps"]].map(([v,l])=>(
                      <button key={v} onClick={()=>setRSort(v)}
                        style={{ flexShrink:0,border:`1.5px solid ${rSort===v?C.gold:C.border}`,background:rSort===v?"#FEF9EC":"white",borderRadius:20,padding:"4px 10px",fontSize:11,fontWeight:600,color:rSort===v?C.gold:C.muted,cursor:"pointer",fontFamily:"inherit" }}>
                        {l}
                      </button>
                    ))}
                  </div>

                  {/* Filtre statut pipeline */}
                  <div style={{ display:"flex",gap:6,marginBottom:16,flexWrap:"wrap" }}>
                    {[["tous","Tous"],["à tester","🧪 À tester"],["testé","✓ Testées"]].map(([v,l])=>(
                      <button key={v} onClick={()=>setRFilter(v)}
                        style={{ flexShrink:0,border:`1.5px solid ${rFilter===v?C.terra:C.border}`,background:rFilter===v?"#FEF3ED":"white",borderRadius:20,padding:"4px 10px",fontSize:11,fontWeight:600,color:rFilter===v?C.terra:C.muted,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap" }}>
                        {l}
                      </button>
                    ))}
                  </div>

                  {/* ── SECTION 1 : PIPELINE ── */}
                  <div style={{ marginBottom:28 }}>
                    <SectionTitle right={<span style={{ fontSize:12,color:C.muted }}>{pipeline.length} recette{pipeline.length>1?"s":""}</span>}>🧪 Pipeline</SectionTitle>
                    <div style={{ display:"flex",flexDirection:"column",gap:8,marginBottom:12 }}>
                      {pipeline.length===0 && <div style={{ textAlign:"center",padding:"24px",color:C.muted,fontSize:13 }}>Aucune recette dans le pipeline</div>}
                      {pipeline.map(r=>RecipeCard(r))}
                    </div>
                    <AddRow placeholder="+ Recette à tester..." onAdd={name=>upd(d=>d.recipes.push({ id:newId(),name,source:"",url:"",cat:"Plat",temps:"",notes:"",rating:0,status:"à tester" }))} />
                  </div>

                  {/* ── SECTION 2 : ADOPTÉES ── */}
                  <div style={{ marginBottom:28 }}>
                    <SectionTitle right={<span style={{ fontSize:12,color:C.sage }}>{adoptees.length} recette{adoptees.length>1?"s":""}</span>}>🌟 Mes adoptées</SectionTitle>
                    <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
                      {adoptees.length===0 && <div style={{ textAlign:"center",padding:"24px",color:C.muted,fontSize:13 }}>Tes recettes favorites apparaîtront ici</div>}
                      {adoptees.map(r=>RecipeCard(r))}
                    </div>
                  </div>

                  {/* ── SECTION 3 : CLASSIQUES ── */}
                  <div>
                    <SectionTitle right={<span style={{ fontSize:11,color:C.muted,fontStyle:"italic" }}>tracker + ajouts manuels</span>}>🏆 Mes classiques</SectionTitle>
                    <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
                      {[...classiques.filter(c=>filterText(c)).map(name=>({
                          id:"t_"+name, name, fromTracker:true,
                          cat: (data.classiquesTrackerMeta||{})[name]?.cat||"",
                          notes: (data.classiquesTrackerMeta||{})[name]?.notes||"",
                        })),
                        ...(data.classiquesManuel||[]).filter(c=>filterText(c.name))
                      ].map((item)=>(
                        <CardShell key={item.id} active={expandedId===item.id} onClick={()=>setExpId(expandedId===item.id?null:item.id)}>
                          <div style={{ padding:"12px 16px",display:"flex",alignItems:"center",gap:12 }}>
                            <span style={{ fontSize:16,flexShrink:0 }}>{item.fromTracker?"📅":"⭐"}</span>
                            <div style={{ flex:1,minWidth:0 }}>
                              <div style={{ fontSize:14,fontWeight:600,color:C.dark }}>{item.name}</div>
                              {item.cat && <span style={{ fontSize:10,background:C.cream,borderRadius:10,padding:"1px 7px",color:C.muted }}>{item.cat}</span>}
                            </div>
                            <span style={{ fontSize:13,color:C.muted }}>›</span>
                          </div>
                          {expandedId===item.id && (
                            <div style={{ borderTop:`1px solid ${C.cream}`,padding:"12px 16px",background:C.light }} onClick={e=>e.stopPropagation()}>
                              <div style={{ display:"flex",gap:8,marginBottom:8 }}>
                                <input value={item.cat||""} onChange={e=>upd(d=>{
                                  if(item.fromTracker){
                                    if(!d.classiquesTrackerMeta) d.classiquesTrackerMeta={};
                                    if(!d.classiquesTrackerMeta[item.name]) d.classiquesTrackerMeta[item.name]={};
                                    d.classiquesTrackerMeta[item.name].cat=e.target.value;
                                  } else {
                                    (d.classiquesManuel||[]).find(x=>x.id===item.id).cat=e.target.value;
                                  }
                                })}
                                  placeholder="Catégorie (plat, dessert...)"
                                  style={{ flex:1,border:`1.5px solid ${C.border}`,background:"white",borderRadius:10,padding:"8px 12px",fontFamily:"inherit",fontSize:12,color:C.dark,outline:"none" }} />
                              </div>
                              <textarea value={item.notes||""} onChange={e=>upd(d=>{
                                if(item.fromTracker){
                                  if(!d.classiquesTrackerMeta) d.classiquesTrackerMeta={};
                                  if(!d.classiquesTrackerMeta[item.name]) d.classiquesTrackerMeta[item.name]={};
                                  d.classiquesTrackerMeta[item.name].notes=e.target.value;
                                } else {
                                  (d.classiquesManuel||[]).find(x=>x.id===item.id).notes=e.target.value;
                                }
                              })}
                                placeholder="Notes rapides (variantes, astuces...)"
                                style={{ width:"100%",border:`1.5px solid ${C.border}`,background:"white",borderRadius:10,padding:"9px 12px",fontFamily:"inherit",fontSize:13,color:C.dark,resize:"none",outline:"none",minHeight:48,lineHeight:1.5 }} />
                              {!item.fromTracker && (
                                <button onClick={()=>upd(d=>{ d.classiquesManuel=(d.classiquesManuel||[]).filter(x=>x.id!==item.id); setExpId(null); })}
                                  style={{ marginTop:8,fontSize:11,color:C.terra,background:"none",border:"none",cursor:"pointer",padding:0,fontFamily:"inherit" }}>Supprimer</button>
                              )}
                            </div>
                          )}
                        </CardShell>
                      ))}
                      {classiques.length===0 && !(data.classiquesManuel||[]).length && (
                        <div style={{ background:"white",borderRadius:14,border:`1px solid ${C.border}`,padding:"28px 20px",textAlign:"center" }}>
                          <div style={{ fontSize:28,marginBottom:8 }}>🍽</div>
                          <div style={{ fontSize:13,color:C.muted,fontStyle:"italic",lineHeight:1.6 }}>
                            Tes classiques apparaîtront ici<br/>depuis le tracker ou en les ajoutant manuellement
                          </div>
                        </div>
                      )}
                    </div>
                    <AddRow placeholder="+ Ajouter un classique manuellement..." onAdd={name=>upd(d=>{ if(!d.classiquesManuel) d.classiquesManuel=[]; d.classiquesManuel.push({ id:newId(), name, cat:"", notes:"" }); })} />
                  </div>

                </div>
              );
            })()}
          </div>
        )}

        {/* ── LIVRES ── */}
        {tab==="livres" && (
          <div>
            {/* Progress bar lus */}
            {(() => {
              const lu    = data.books.filter(b=>b.status==="lu").length;
              const cours = data.books.filter(b=>b.status==="en cours").length;
              const total = data.books.length;
              const pct   = total>0 ? Math.round((lu/total)*100) : 0;
              return (
                <div style={{ background:"white",borderRadius:14,padding:"14px 18px",border:`1px solid ${C.border}`,marginBottom:16,display:"flex",alignItems:"center",gap:16 }}>
                  <div style={{ flex:1 }}>
                    <div style={{ display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:12 }}>
                      <span style={{ color:C.muted }}>{lu} lu{lu>1?"s":""} · {cours} en cours · {total-lu-cours} à lire</span>
                      <span style={{ fontWeight:700,color:C.sage }}>{pct}%</span>
                    </div>
                    <div style={{ height:6,background:C.cream,borderRadius:3,overflow:"hidden" }}>
                      <div style={{ height:"100%",background:`linear-gradient(90deg,${C.sage},${C.gold})`,borderRadius:3,width:`${pct}%`,transition:"width 0.5s" }}/>
                    </div>
                  </div>
                </div>
              );
            })()}
            {/* Filtre statut livres */}
            <div style={{ display:"flex",gap:6,marginBottom:16,flexWrap:"wrap" }}>
              {[["tous","Tous"],["à lire","📚 À lire"],["en cours","📖 En cours"],["lu","✓ Lus"]].map(([v,l])=>(
                <button key={v} onClick={()=>setBookFilter(v)}
                  style={{ flexShrink:0,border:`1.5px solid ${bookFilter===v?C.gold:C.border}`,background:bookFilter===v?"#FEF9EC":"white",borderRadius:20,padding:"4px 10px",fontSize:11,fontWeight:600,color:bookFilter===v?C.gold:C.muted,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap" }}>
                  {l}
                </button>
              ))}
            </div>
            <SectionTitle>{data.books.length} livres</SectionTitle>
            <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
              {data.books.filter(b=>(filterText(b.name)||filterText(b.author||""))&&(bookFilter==="tous"||b.status===bookFilter)).map(b=>(
                <CardShell key={b.id} active={expandedId===b.id} accent={C.gold} onClick={()=>toggle(b.id)}>
                  <div style={{ padding:"14px 18px",display:"flex",alignItems:"center",gap:12 }}>
                    <div style={{ width:42,height:54,borderRadius:8,background:b.status==="lu"?C.sage:b.status==="en cours"?C.terra:C.warm,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:18 }}>
                      {b.status==="lu"?"✓":b.status==="en cours"?"📖":"📚"}
                    </div>
                    <div style={{ flex:1,minWidth:0 }}>
                      <div style={{ fontSize:14,fontWeight:600,color:C.dark,marginBottom:2 }}>{b.name}</div>
                      {b.author && <div style={{ fontSize:12,color:C.muted }}>{b.author}</div>}
                      {b.status==="lu" && b.rating>0 && <div style={{ marginTop:4,display:"flex",gap:1 }}>{"★".repeat(b.rating)+"☆".repeat(5-b.rating)}</div>}
                    </div>
                    <StatusPill value={b.status} options={BOOK_STATUS} onChange={v=>upd(d=>{ d.books.find(x=>x.id===b.id).status=v; })} />
                  </div>
                  {expandedId===b.id && (
                    <div style={{ borderTop:`1px solid ${C.cream}`,padding:"14px 18px",background:C.light }} onClick={e=>e.stopPropagation()}>
                      <div style={{ display:"flex",gap:8,marginBottom:10,flexWrap:"wrap",alignItems:"center" }}>
                        <input value={b.author||""} onChange={e=>upd(d=>{ d.books.find(x=>x.id===b.id).author=e.target.value; })}
                          placeholder="Auteur..."
                          style={{ flex:1,minWidth:140,border:`1.5px solid ${C.border}`,background:"white",borderRadius:10,padding:"8px 12px",fontFamily:"inherit",fontSize:13,color:C.dark,outline:"none" }} />
                        {b.status==="lu" && <div style={{ display:"flex",alignItems:"center",gap:6 }}>
                          <span style={{ fontSize:11,color:C.muted }}>Note :</span>
                          <Stars value={b.rating||0} onChange={v=>upd(d=>{ d.books.find(x=>x.id===b.id).rating=v; })} />
                        </div>}
                      </div>
                      <textarea value={b.notes||""} onChange={e=>upd(d=>{ d.books.find(x=>x.id===b.id).notes=e.target.value; })}
                        placeholder="Mes notes de lecture, citations favorites..."
                        style={{ width:"100%",border:`1.5px solid ${C.border}`,background:"white",borderRadius:10,padding:"10px 12px",fontFamily:"inherit",fontSize:13,color:C.dark,resize:"none",outline:"none",minHeight:70,lineHeight:1.6 }} />
                      <button onClick={()=>upd(d=>{ d.books=d.books.filter(x=>x.id!==b.id); setExpId(null); })}
                        style={{ marginTop:10,fontSize:11,color:C.terra,background:"none",border:"none",cursor:"pointer",padding:0,fontFamily:"inherit" }}>Supprimer</button>
                    </div>
                  )}
                </CardShell>
              ))}
            </div>
            <AddRow placeholder="+ Nouveau livre..." extraField="Auteur..." onAdd={(name,author)=>upd(d=>d.books.push({ id:newId(),name,author,status:"à lire",notes:"",rating:0 }))} />
          </div>
        )}

        {/* ── PODCASTS ── */}
        {tab==="podcasts" && (
          <div>
            {/* Filtre statut */}
            <div style={{ display:"flex",gap:6,marginBottom:16,flexWrap:"wrap" }}>
              {[["tous","Tous"],["à écouter","🎧 À écouter"],["en cours","▶️ En cours"],["terminé","✓ Terminés"]].map(([v,l])=>(
                <button key={v} onClick={()=>setPodFilter(v)}
                  style={{ flexShrink:0,border:`1.5px solid ${podFilter===v?C.terra:C.border}`,background:podFilter===v?"#FEF3ED":"white",borderRadius:20,padding:"4px 10px",fontSize:11,fontWeight:600,color:podFilter===v?C.terra:C.muted,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap" }}>
                  {l}
                </button>
              ))}
            </div>
            <SectionTitle>{data.podcasts.length} podcasts</SectionTitle>
            <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
              {data.podcasts.filter(p=>(filterText(p.name)||filterText(p.notes||""))&&(podFilter==="tous"||p.status===podFilter)).map(p=>(
                <CardShell key={p.id} active={expandedId===p.id} onClick={()=>toggle(p.id)}>
                  <div style={{ padding:"14px 18px",display:"flex",alignItems:"center",gap:12 }}>
                    <div style={{ width:44,height:44,borderRadius:12,background:p.status==="terminé"?C.sage+"22":p.status==="en cours"?C.terra+"22":C.warm,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0 }}>🎙️</div>
                    <div style={{ flex:1,minWidth:0 }}>
                      <div style={{ fontSize:14,fontWeight:600,color:C.dark }}>{p.name}</div>
                      {p.notes && <div style={{ fontSize:12,color:C.muted,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap" }}>{p.notes}</div>}
                      {p.status==="terminé" && p.rating>0 && <div style={{ marginTop:3,display:"flex",gap:1,fontSize:12 }}>{"★".repeat(p.rating)+"☆".repeat(5-p.rating)}</div>}
                    </div>
                    <StatusPill value={p.status} options={POD_STATUS} onChange={v=>upd(d=>{ d.podcasts.find(x=>x.id===p.id).status=v; })} />
                  </div>
                  {expandedId===p.id && (
                    <div style={{ borderTop:`1px solid ${C.cream}`,padding:"14px 18px",background:C.light }} onClick={e=>e.stopPropagation()}>
                      <textarea value={p.notes||""} onChange={e=>upd(d=>{ d.podcasts.find(x=>x.id===p.id).notes=e.target.value; })}
                        placeholder="Description, notes, épisodes favoris..."
                        style={{ width:"100%",border:`1.5px solid ${C.border}`,background:"white",borderRadius:10,padding:"10px 12px",fontFamily:"inherit",fontSize:13,color:C.dark,resize:"none",outline:"none",minHeight:70,lineHeight:1.6,marginBottom:8 }} />
                      <div style={{ display:"flex",gap:8,marginBottom:8,alignItems:"center" }}>
                        <div style={{ flex:1,display:"flex",gap:6,alignItems:"center" }}>

            {(() => {
              const GOAL_CATS = ["Perso","Santé","Pro","Finances","Relations","Créativité","Autre"];
              const CAT_COLORS = { Perso:"#FEF3ED", Santé:"#F0FDF4", Pro:"#EFF6FF", Finances:"#FEF9EC", Relations:"#FDF4FF", Créativité:"#FFF7ED", Autre:C.cream };
              const CAT_TEXT   = { Perso:C.terra, Santé:C.sage, Pro:"#3B82F6", Finances:C.gold, Relations:"#A855F7", Créativité:"#F97316", Autre:C.muted };

              const today = new Date().toISOString().slice(0,10);
              const isOverdue = (g) => !g.done && g.deadline && g.deadline < today;
              const daysLeft  = (g) => {
                if(!g.deadline) return null;
                const diff = Math.ceil((new Date(g.deadline)-new Date(today))/(1000*60*60*24));
                return diff;
              };

              const sortGoals = (a,b) => {
                if(goalSort==="échéance") {
                  if(!a.deadline && !b.deadline) return 0;
                  if(!a.deadline) return 1;
                  if(!b.deadline) return -1;
                  return a.deadline.localeCompare(b.deadline);
                }
                if(goalSort==="cat") return (a.cat||"zzz").localeCompare(b.cat||"zzz");
                if(goalSort==="nom") return a.name.localeCompare(b.name);
                return 0;
              };
              const active     = data.goals.filter(g=>!g.done && filterText(g.name)).sort(sortGoals);
              const accomplished = data.goals.filter(g=>g.done && filterText(g.name));
              const done  = accomplished.length;
              const total = data.goals.length;
              const pct   = total>0 ? Math.round((done/total)*100) : 0;

              const GoalCard = (g) => (
                <CardShell key={g.id} active={expandedId===g.id} onClick={()=>setExpId(expandedId===g.id?null:g.id)}>
                  <div style={{ padding:"14px 18px",display:"flex",alignItems:"center",gap:12 }}>
                    <div onClick={e=>{e.stopPropagation();upd(d=>{ const f=d.goals.find(x=>x.id===g.id); f.done=!f.done; f.doneAt=f.done?today:null; });}}

                      {g.done&&"✓"}
                    </div>
                    <div style={{ flex:1,minWidth:0 }}>
                      <div style={{ fontSize:14,fontWeight:600,color:g.done?C.muted:C.dark,textDecoration:g.done?"line-through":"none" }}>{g.name}</div>
                      <div style={{ display:"flex",gap:5,marginTop:3,flexWrap:"wrap",alignItems:"center" }}>
                        {g.cat && <span style={{ fontSize:10,background:CAT_COLORS[g.cat]||C.cream,color:CAT_TEXT[g.cat]||C.muted,borderRadius:10,padding:"1px 7px",fontWeight:600 }}>{g.cat}</span>}
                        {g.done && g.doneAt && <span style={{ fontSize:10,color:C.sage }}>✓ {g.doneAt}</span>}
                        {!g.done && g.deadline && (()=>{
                          const d = daysLeft(g);
                          const over = isOverdue(g);
                          return <span style={{ fontSize:10,color:over?C.terra:d<=7?"#F97316":C.muted,fontWeight:over||d<=7?600:400 }}>
                            {over ? `⚠️ ${Math.abs(d)}j de retard` : d===0 ? "⚠️ Aujourd'hui !" : `📅 ${d}j restants`}
                          </span>;
                        })()}
                      </div>
                    </div>
                    <span style={{ fontSize:13,color:C.muted }}>›</span>
                  </div>
                  {expandedId===g.id && (
                    <div style={{ borderTop:`1px solid ${C.cream}`,padding:"14px 18px",background:C.light }} onClick={e=>e.stopPropagation()}>
                      {/* Catégorie pills */}
                      <div style={{ display:"flex",gap:5,flexWrap:"wrap",marginBottom:10 }}>
                        {GOAL_CATS.map(c=>(
                          <button key={c} onClick={()=>upd(d=>{ d.goals.find(x=>x.id===g.id).cat=g.cat===c?"":c; })}
                            style={{ border:`1.5px solid ${g.cat===c?(CAT_TEXT[c]||C.muted):C.border}`,background:g.cat===c?(CAT_COLORS[c]||C.cream):"white",borderRadius:16,padding:"3px 10px",fontSize:11,fontWeight:500,color:g.cat===c?(CAT_TEXT[c]||C.muted):C.muted,cursor:"pointer",fontFamily:"inherit" }}>
                            {c}
                          </button>
                        ))}
                      </div>
                      {/* Échéance */}
                      <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:8 }}>
                        <span style={{ fontSize:11,color:C.muted,flexShrink:0 }}>📅 Échéance :</span>
                        <input type="date" value={g.deadline||""} onChange={e=>upd(d=>{ d.goals.find(x=>x.id===g.id).deadline=e.target.value; })}
                          style={{ flex:1,border:`1.5px solid ${C.border}`,background:"white",borderRadius:10,padding:"7px 12px",fontFamily:"inherit",fontSize:12,color:C.dark,outline:"none",cursor:"pointer" }} />
                        {g.deadline && <button onClick={()=>upd(d=>{ d.goals.find(x=>x.id===g.id).deadline=""; })}
                          style={{ fontSize:11,color:C.muted,background:"none",border:"none",cursor:"pointer",padding:0 }}>✕</button>}
                      </div>
                      {/* Notes */}
                      <textarea value={g.notes||""} onChange={e=>upd(d=>{ d.goals.find(x=>x.id===g.id).notes=e.target.value; })}
                        placeholder="Pourquoi cet objectif ? Comment y arriver ? Étapes..."
                        style={{ width:"100%",border:`1.5px solid ${C.border}`,background:"white",borderRadius:10,padding:"10px 12px",fontFamily:"inherit",fontSize:13,color:C.dark,resize:"none",outline:"none",minHeight:80,lineHeight:1.6 }} />
                      <button onClick={()=>upd(d=>{ d.goals=d.goals.filter(x=>x.id!==g.id); setExpId(null); })}
                        style={{ marginTop:8,fontSize:11,color:C.terra,background:"none",border:"none",cursor:"pointer",padding:0,fontFamily:"inherit" }}>Supprimer</button>
                    </div>
                  )}
                </CardShell>
              );

              return (
                <div>
                  {/* Tri */}
                  <div style={{ display:"flex",gap:6,marginBottom:14,alignItems:"center",flexWrap:"wrap" }}>
                    <span style={{ fontSize:11,color:C.muted,flexShrink:0 }}>Trier :</span>
                    {[["échéance","📅 Échéance"],["cat","Catégorie"],["nom","A→Z"]].map(([v,l])=>(
                      <button key={v} onClick={()=>setGoalSort(v)}
                        style={{ flexShrink:0,border:`1.5px solid ${goalSort===v?C.sage:C.border}`,background:goalSort===v?"#F0FDF4":"white",borderRadius:20,padding:"4px 10px",fontSize:11,fontWeight:600,color:goalSort===v?C.sage:C.muted,cursor:"pointer",fontFamily:"inherit" }}>
                        {l}
                      </button>
                    ))}
                  </div>

                  {/* Barre de progression */}
                  <div style={{ background:"white",borderRadius:14,padding:"16px 20px",border:`1px solid ${C.border}`,marginBottom:20 }}>
                    <div style={{ display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:13 }}>
                      <span style={{ fontWeight:600 }}>Progression · {done}/{total}</span>
                      <span style={{ color:C.sage,fontWeight:700 }}>{pct}%</span>
                    </div>
                    <div style={{ height:6,background:C.cream,borderRadius:3,overflow:"hidden" }}>
                      <div style={{ height:"100%",background:`linear-gradient(90deg,${C.sage},${C.gold})`,borderRadius:3,width:`${pct}%`,transition:"width 0.5s" }}/>
                    </div>
                    <div style={{ fontSize:11,color:C.muted,marginTop:8,fontStyle:"italic" }}>
                      {pct===100?"🎉 Tous les objectifs accomplis !":pct>=50?"Tu es à mi-chemin ✨":"Continue, chaque pas compte 🌱"}
                    </div>
                  </div>

                  {/* En cours */}
                  <div style={{ display:"flex",flexDirection:"column",gap:8,marginBottom: accomplished.length>0?24:0 }}>
                    {active.length===0 && <div style={{ textAlign:"center",padding:"28px 20px",color:C.muted,fontSize:13 }}>🎯 Ajoute ton premier objectif</div>}
                    {active.map(g=>GoalCard(g))}
                  </div>

                  {/* Accomplis */}
                  {accomplished.length>0 && (
                    <div>
                      <div style={{ fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:8 }}>Accomplis · {accomplished.length}</div>
                      <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
                        {accomplished.map(g=>GoalCard(g))}
                      </div>
                    </div>
                  )}

                  <AddRow placeholder="+ Nouvel objectif..." onAdd={name=>upd(d=>d.goals.push({ id:newId(),name,done:false,doneAt:null,cat:"",deadline:"",notes:"" }))} />
                </div>
              );
            })()}
          </div>
        )}

        {/* ── NETTOYAGE ── */}
        {tab==="nettoyage" && (()=>{
          const today = new Date();
          const diffDays = (lastDone) => {
            if (!lastDone) return null;
            return Math.floor((today - new Date(lastDone)) / (1000*60*60*24));
          };
          const isDue = (item) => {
            if (!item.lastDone) return "retard";
            const d = diffDays(item.lastDone);
            if (d >= item.freqDays) return "retard";
            if (d >= item.freqDays - 3) return "bientot";
            return "ok";
          };
          const STATUS = {
            retard:  { emoji:"🔴", label:"En retard", color:C.terra },
            bientot: { emoji:"🟡", label:"Bientôt",   color:C.gold  },
            ok:      { emoji:"🟢", label:"OK",         color:C.sage  },
          };
          const FREQS = [
            { id:"quotidien",    label:"Quotidien",    emoji:"☀️" },
            { id:"hebdo",        label:"Hebdomadaire", emoji:"📅" },
            { id:"mensuel",      label:"Mensuel",      emoji:"🗓" },
            { id:"trimestriel",  label:"Trimestriel",  emoji:"📆" },
          ];
          const retardCount = data.cleaning.filter(c=>isDue(c)==="retard").length;
          const bientotCount = data.cleaning.filter(c=>isDue(c)==="bientot").length;
          const formatLast = (lastDone) => {
            if (!lastDone) return "jamais fait";
            const d = diffDays(lastDone);
            if (d === 0) return "aujourd'hui ✓";
            if (d === 1) return "hier";
            if (d < 7)  return `il y a ${d} jours`;
            if (d < 30) return `il y a ${Math.floor(d/7)} sem.`;
            return `il y a ${Math.floor(d/30)} mois`;
          };
          return (
            <div>
              {/* Résumé statut */}
              {(retardCount > 0 || bientotCount > 0) && (
                <div style={{ display:"flex",gap:10,marginBottom:16,flexWrap:"wrap" }}>
                  {retardCount > 0 && (
                    <div style={{ flex:1,minWidth:120,background:"#FEF2F2",border:"1.5px solid #FECACA",borderRadius:12,padding:"12px 16px",display:"flex",alignItems:"center",gap:10 }}>
                      <span style={{ fontSize:22 }}>🔴</span>
                      <div>
                        <div style={{ fontSize:16,fontWeight:700,color:C.terra }}>{retardCount}</div>
                        <div style={{ fontSize:11,color:C.muted }}>en retard</div>
                      </div>
                    </div>
                  )}
                  {bientotCount > 0 && (
                    <div style={{ flex:1,minWidth:120,background:"#FFFBEB",border:"1.5px solid #FDE68A",borderRadius:12,padding:"12px 16px",display:"flex",alignItems:"center",gap:10 }}>
                      <span style={{ fontSize:22 }}>🟡</span>
                      <div>
                        <div style={{ fontSize:16,fontWeight:700,color:C.gold }}>{bientotCount}</div>
                        <div style={{ fontSize:11,color:C.muted }}>à faire bientôt</div>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* Sections par fréquence */}
              {FREQS.map(freq => {
                const URGENCY = { retard:0, bientot:1, ok:2 };
                const items = data.cleaning
                  .filter(c => c.freq === freq.id && (filterText(c.name) || filterText(c.notes||"")))
                  .sort((a,b) => (URGENCY[isDue(a)]||2)-(URGENCY[isDue(b)]||2));
                if (items.length === 0) return null;
                const freqRetard = items.filter(c=>isDue(c)==="retard").length;
                return (
                  <div key={freq.id} style={{ marginBottom:20 }}>
                    <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:10 }}>
                      <span style={{ fontSize:14 }}>{freq.emoji}</span>
                      <span style={{ fontSize:11,fontWeight:700,letterSpacing:"2px",textTransform:"uppercase",color:C.muted }}>{freq.label}</span>
                      {freqRetard > 0 && <span style={{ fontSize:10,background:"#FEF2F2",color:C.terra,borderRadius:20,padding:"2px 8px",fontWeight:600 }}>{freqRetard} en retard</span>}
                    </div>
                    <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
                      {items.map(item => {
                        const status = isDue(item);
                        const st = STATUS[status];
                        const daysAgo = diffDays(item.lastDone);
                        const daysLeft = item.lastDone ? item.freqDays - daysAgo : 0;
                        return (
                          <div key={item.id} style={{ background:"white",borderRadius:14,border:`1.5px solid ${expandedId===item.id?C.dark:C.border}`,overflow:"hidden",transition:"border-color 0.15s" }}>
                            <div style={{ padding:"13px 16px",display:"flex",alignItems:"center",gap:12 }}>
                              <span style={{ fontSize:16,flexShrink:0 }}>{st.emoji}</span>
                              <div style={{ flex:1,minWidth:0 }}>
                                <div style={{ fontSize:13,fontWeight:600,color:C.dark }}>{item.name}</div>
                                <div style={{ fontSize:11,color:C.muted,marginTop:2 }}>
                                  {item.lastDone
                                    ? <span>{formatLast(item.lastDone)}{status==="ok" && daysLeft > 0 ? <span style={{ color:C.sage,marginLeft:6 }}>· dans {daysLeft}j</span> : null}</span>
                                    : <span style={{ color:C.terra }}>jamais fait</span>
                                  }
                                </div>
                              </div>
                              <div style={{ display:"flex",gap:6,alignItems:"center" }}>
                                <button onClick={e=>{e.stopPropagation(); upd(d=>{ d.cleaning.find(x=>x.id===item.id).lastDone=new Date().toISOString().slice(0,10); }); }}
                                  style={{ background:C.sage,border:"none",borderRadius:10,padding:"6px 12px",color:"white",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"inherit",whiteSpace:"nowrap" }}>
                                  Fait ✓
                                </button>
                                <button onClick={e=>{e.stopPropagation(); setExpId(expandedId===item.id?null:item.id);}}
                                  style={{ fontSize:13,color:C.muted,background:"none",border:"none",cursor:"pointer",padding:"2px 4px" }}>✏️</button>
                              </div>
                            </div>
                            {/* Barre de progression */}
                            {item.lastDone && (
                              <div style={{ height:3,background:C.cream }}>
                                <div style={{ height:"100%",background:st.color,borderRadius:3,width:`${Math.min(100,Math.round((daysAgo/item.freqDays)*100))}%`,transition:"width 0.5s" }}/>
                              </div>
                            )}
                            {/* Panneau édition */}
                            {expandedId===item.id && (
                              <div style={{ borderTop:`1px solid ${C.cream}`,padding:"12px 16px",background:C.light }} onClick={e=>e.stopPropagation()}>
                                <div style={{ display:"flex",gap:8,marginBottom:8,flexWrap:"wrap" }}>
                                  <input value={item.name} onChange={e=>upd(d=>{ d.cleaning.find(x=>x.id===item.id).name=e.target.value; })}
                                    style={{ flex:1,minWidth:140,border:`1.5px solid ${C.border}`,background:"white",borderRadius:10,padding:"7px 12px",fontFamily:"inherit",fontSize:13,color:C.dark,outline:"none" }} />
                                  <select value={item.freq} onChange={e=>upd(d=>{ d.cleaning.find(x=>x.id===item.id).freq=e.target.value; })}
                                    style={{ border:`1.5px solid ${C.border}`,background:"white",borderRadius:10,padding:"7px 12px",fontFamily:"inherit",fontSize:12,color:C.dark,outline:"none",cursor:"pointer" }}>
                                    {FREQS.map(f=><option key={f.id} value={f.id}>{f.label}</option>)}
                                  </select>
                                </div>
                                <div style={{ display:"flex",gap:8,marginBottom:8,flexWrap:"wrap",alignItems:"center" }}>
                                  <label style={{ fontSize:11,color:C.muted,whiteSpace:"nowrap" }}>Tous les</label>
                                  <input type="number" value={item.freqDays} onChange={e=>upd(d=>{ d.cleaning.find(x=>x.id===item.id).freqDays=parseInt(e.target.value)||1; })}
                                    style={{ width:60,border:`1.5px solid ${C.border}`,background:"white",borderRadius:10,padding:"7px 10px",fontFamily:"inherit",fontSize:13,color:C.dark,outline:"none",textAlign:"center" }} />
                                  <label style={{ fontSize:11,color:C.muted }}>jours</label>
                                  <label style={{ fontSize:11,color:C.muted,marginLeft:8,whiteSpace:"nowrap" }}>Dernière fois :</label>
                                  <input type="date" value={item.lastDone||""} onChange={e=>upd(d=>{ d.cleaning.find(x=>x.id===item.id).lastDone=e.target.value; })}
                                    style={{ border:`1.5px solid ${C.border}`,background:"white",borderRadius:10,padding:"7px 10px",fontFamily:"inherit",fontSize:12,color:C.dark,outline:"none" }} />
                                </div>
                                <input value={item.notes||""} onChange={e=>upd(d=>{ d.cleaning.find(x=>x.id===item.id).notes=e.target.value; })}
                                  placeholder="Notes..."
                                  style={{ width:"100%",border:`1.5px solid ${C.border}`,background:"white",borderRadius:10,padding:"7px 12px",fontFamily:"inherit",fontSize:12,color:C.dark,outline:"none",marginBottom:8 }} />
                                <button onClick={()=>{ upd(d=>{ d.cleaning=d.cleaning.filter(x=>x.id!==item.id); }); setExpId(null); }}
                                  style={{ fontSize:11,color:C.terra,background:"none",border:"none",cursor:"pointer",padding:0,fontFamily:"inherit" }}>Supprimer</button>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}

              {/* Ajouter une tâche */}
              <div style={{ background:C.cream,borderRadius:14,border:`1.5px solid ${C.border}`,padding:"14px 16px",marginTop:8 }}>
                <div style={{ fontSize:10,fontWeight:700,letterSpacing:"1.5px",textTransform:"uppercase",color:C.muted,marginBottom:10 }}>Nouvelle tâche</div>
                <div style={{ display:"flex",gap:8,marginBottom:8,flexWrap:"wrap" }}>
                  <input value={newCleanName} onChange={e=>setNewCleanName(e.target.value)}
                    placeholder="Nom de la tâche..."
                    style={{ flex:1,minWidth:160,border:`1.5px solid ${C.border}`,background:"white",borderRadius:10,padding:"8px 12px",fontFamily:"inherit",fontSize:13,color:C.dark,outline:"none" }} />
                  <select value={newCleanFreq} onChange={e=>setNewCleanFreq(e.target.value)}
                    style={{ border:`1.5px solid ${C.border}`,background:"white",borderRadius:10,padding:"8px 12px",fontFamily:"inherit",fontSize:12,color:C.dark,outline:"none",cursor:"pointer" }}>
                    {FREQS.map(f=><option key={f.id} value={f.id}>{f.label}</option>)}
                  </select>
                </div>
                <div style={{ display:"flex",gap:8,alignItems:"center" }}>
                  <label style={{ fontSize:11,color:C.muted,whiteSpace:"nowrap" }}>Tous les</label>
                  <input type="number" value={newCleanDays} min="1" onChange={e=>setNewCleanDays(parseInt(e.target.value)||1)}
                    style={{ width:60,border:`1.5px solid ${C.border}`,background:"white",borderRadius:10,padding:"8px 10px",fontFamily:"inherit",fontSize:13,color:C.dark,outline:"none",textAlign:"center" }} />
                  <label style={{ fontSize:11,color:C.muted }}>jours</label>
                  <button onClick={()=>{
                    if(!newCleanName.trim()) return;
                    upd(d=>d.cleaning.push({ id:newId(),name:newCleanName.trim(),freq:newCleanFreq,freqDays:newCleanDays,lastDone:null,notes:"" }));
                    setNewCleanName(""); setNewCleanDays(30);
                  }}
                    style={{ marginLeft:"auto",background:C.dark,border:"none",borderRadius:10,padding:"8px 16px",color:"white",cursor:"pointer",fontSize:13,fontWeight:600,fontFamily:"inherit",whiteSpace:"nowrap" }}>
                    + Ajouter
                  </button>
                </div>
              </div>
            </div>
          );
        })()}

        {/* ── DÉFIS ── */}
        {tab==="defis" && (()=>{
          const dynCats = ["all", ...new Set(data.defis.map(d=>d.cat).filter(Boolean))];
          const CAT_EMOJIS = { all:"✨", mindset:"🧠", corps:"💪", cuisine:"🍳", social:"🤝", aventure:"🌍", perso:"🌸", digital:"📱" };
          const today = new Date().toISOString().slice(0,10);
          const doneCount = data.defis.filter(d=>d.done).length;
          const total     = data.defis.length;
          const pct       = total>0 ? Math.round((doneCount/total)*100) : 0;

          const activeDefis = data.defis.filter(d=>!d.done&&(activeCat==="all"||d.cat===activeCat)&&filterText(d.name));
          const doneDefis   = data.defis.filter(d=>d.done&&(activeCat==="all"||d.cat===activeCat)&&filterText(d.name));

          const DefiCard = (defi) => (
            <div key={defi.id}>
              <div
                onClick={()=>upd(d=>{ const f=d.defis.find(x=>x.id===defi.id); f.done=!f.done; f.doneAt=f.done?today:null; if(f.done) f.notes=f.notes||""; })}
                style={{ background:defi.done?"#F0FDF4":"white",border:`1.5px solid ${defi.done?C.sage:expandedId===defi.id?C.dark:C.border}`,borderRadius:expandedId===defi.id?"14px 14px 0 0":14,padding:"14px 18px",cursor:"pointer",display:"flex",alignItems:"center",gap:12,transition:"all 0.2s" }}
                onMouseEnter={e=>{ if(expandedId!==defi.id) e.currentTarget.style.boxShadow="0 4px 16px rgba(0,0,0,0.07)"; }}
                onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
                <div style={{ width:36,height:36,borderRadius:11,background:defi.done?"#D1FAE5":C.cream,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0 }}>{defi.emoji}</div>
                <div style={{ flex:1,minWidth:0 }}>
                  <div style={{ fontSize:13,fontWeight:500,color:defi.done?C.sage:C.dark,textDecoration:defi.done?"line-through":"none",lineHeight:1.4 }}>{defi.name}</div>
                  <div style={{ fontSize:10,color:C.muted,marginTop:2,display:"flex",gap:8,flexWrap:"wrap" }}>
                    <span>{CAT_EMOJIS[defi.cat]||"🏷"} {defi.cat}</span>
                    {defi.doneAt && <span style={{ color:C.sage }}>✓ {defi.doneAt}</span>}
                    {defi.notes && <span style={{ fontStyle:"italic",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:160 }}>{defi.notes}</span>}
                  </div>
                </div>
                <div style={{ display:"flex",alignItems:"center",gap:8 }}>
                  <button onClick={e=>{e.stopPropagation(); setExpId(expandedId===defi.id?null:defi.id);}}
                    style={{ fontSize:12,color:C.muted,background:"none",border:"none",cursor:"pointer",padding:"2px 6px" }}>
                    {expandedId===defi.id?"▲":"✏️"}
                  </button>
                  <div style={{ width:22,height:22,borderRadius:"50%",border:defi.done?"none":`1.5px solid ${C.border}`,background:defi.done?C.sage:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"white",flexShrink:0,transition:"all 0.2s" }}>{defi.done&&"✓"}</div>
                </div>
              </div>
              {expandedId===defi.id && (
                <div style={{ background:C.light,border:`1.5px solid ${C.dark}`,borderTop:"none",borderRadius:"0 0 14px 14px",padding:"12px 16px" }} onClick={e=>e.stopPropagation()}>
                  <div style={{ display:"flex",gap:8,marginBottom:8,flexWrap:"wrap" }}>
                    <input value={defi.emoji} onChange={e=>upd(d=>{ d.defis.find(x=>x.id===defi.id).emoji=e.target.value; })}
                      style={{ width:44,border:`1.5px solid ${C.border}`,background:"white",borderRadius:10,padding:"7px",fontFamily:"inherit",fontSize:18,textAlign:"center",outline:"none" }} />
                    <input value={defi.name} onChange={e=>upd(d=>{ d.defis.find(x=>x.id===defi.id).name=e.target.value; })}
                      placeholder="Nom du défi..."
                      style={{ flex:1,minWidth:160,border:`1.5px solid ${C.border}`,background:"white",borderRadius:10,padding:"8px 12px",fontFamily:"inherit",fontSize:13,color:C.dark,outline:"none" }} />
                  </div>
                  <div style={{ marginBottom:8 }}>
                    <datalist id={"cats-"+defi.id}>
                      {dynCats.filter(c=>c!=="all").map(c=><option key={c} value={c}/>)}
                    </datalist>
                    <input list={"cats-"+defi.id} value={defi.cat||""} onChange={e=>upd(d=>{ d.defis.find(x=>x.id===defi.id).cat=e.target.value.toLowerCase().trim(); })}
                      placeholder="Catégorie..."
                      style={{ width:"100%",border:`1.5px solid ${C.border}`,background:"white",borderRadius:10,padding:"8px 12px",fontFamily:"inherit",fontSize:13,color:C.dark,outline:"none" }} />
                  </div>
                  <textarea value={defi.notes||""} onChange={e=>upd(d=>{ d.defis.find(x=>x.id===defi.id).notes=e.target.value; })}
                    placeholder="Comment tu l'as relevé ? Ce que ça t'a apporté..."
                    style={{ width:"100%",border:`1.5px solid ${C.border}`,background:"white",borderRadius:10,padding:"9px 12px",fontFamily:"inherit",fontSize:13,color:C.dark,resize:"none",outline:"none",minHeight:60,lineHeight:1.5,marginBottom:8 }} />
                  {defi.done && (
                    <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:8 }}>
                      <span style={{ fontSize:11,color:C.muted }}>✓ Accompli le :</span>
                      <input type="date" value={defi.doneAt||""} onChange={e=>upd(d=>{ d.defis.find(x=>x.id===defi.id).doneAt=e.target.value; })}
                        style={{ flex:1,border:`1.5px solid ${C.border}`,background:"white",borderRadius:10,padding:"6px 10px",fontFamily:"inherit",fontSize:12,color:C.sage,outline:"none" }} />
                    </div>
                  )}
                  <button onClick={()=>{ upd(d=>{ d.defis=d.defis.filter(x=>x.id!==defi.id); }); setExpId(null); }}
                    style={{ fontSize:11,color:C.terra,background:"none",border:"none",cursor:"pointer",padding:0,fontFamily:"inherit" }}>Supprimer</button>
                </div>
              )}
            </div>
          );

          return (
            <div>
              {/* Progress */}
              <div style={{ background:C.dark,borderRadius:16,padding:"18px 20px",border:`1px solid ${C.border}`,marginBottom:16,position:"relative",overflow:"hidden" }}>
                <div style={{ position:"absolute",top:-20,right:-20,width:80,height:80,borderRadius:"50%",background:C.gold,opacity:0.15 }}/>
                <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,position:"relative",zIndex:1 }}>
                  <div>
                    <span style={{ fontSize:22,fontWeight:700,color:C.gold,fontFamily:"Georgia,serif" }}>{doneCount}</span>
                    <span style={{ fontSize:14,color:C.muted }}> / {total} défis accomplis</span>
                  </div>
                  <span style={{ fontSize:18,fontWeight:700,color:C.gold }}>{pct}%</span>
                </div>
                <div style={{ height:8,background:"rgba(255,255,255,0.08)",borderRadius:20,overflow:"hidden",position:"relative",zIndex:1 }}>
                  <div style={{ height:"100%",background:`linear-gradient(90deg,${C.terra},${C.gold})`,borderRadius:20,width:`${pct}%`,transition:"width 0.5s" }}/>
                </div>
                <div style={{ fontSize:11,color:C.muted,marginTop:8,fontStyle:"italic",position:"relative",zIndex:1 }}>
                  {pct===100?"🎉 Tous les défis accomplis !":pct>=50?"Tu es sur la bonne voie ✨":"Chaque défi accompli compte 🌿"}
                </div>
              </div>

              {/* Filtres catégories */}
              <div style={{ display:"flex",gap:6,marginBottom:14,overflowX:"auto",paddingBottom:4,scrollbarWidth:"none" }}>
                {dynCats.map(c=>(
                  <button key={c} onClick={()=>setActiveCat(c)}
                    style={{ flexShrink:0,padding:"6px 12px",borderRadius:20,border:`1.5px solid ${activeCat===c?C.terra:C.border}`,background:activeCat===c?C.terra:"white",color:activeCat===c?"white":C.muted,fontSize:12,fontWeight:500,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap" }}>
                    {CAT_EMOJIS[c]||"🏷"} {c==="all"?"Tout":c.charAt(0).toUpperCase()+c.slice(1)}
                  </button>
                ))}
              </div>

              {/* Défis actifs */}
              <div style={{ display:"flex",flexDirection:"column",gap:8,marginBottom:doneDefis.length>0?24:12 }}>
                {activeDefis.length===0 && doneDefis.length===0 && <div style={{ textAlign:"center",padding:"28px",color:C.muted,fontSize:13 }}>🏆 Ajoute ton premier défi</div>}
                {activeDefis.map(d=>DefiCard(d))}
              </div>

              {/* Défis accomplis */}
              {doneDefis.length>0 && (
                <div style={{ marginBottom:16 }}>
                  <div style={{ fontSize:11,fontWeight:700,color:C.sage,textTransform:"uppercase",letterSpacing:1,marginBottom:8 }}>Accomplis · {doneDefis.length} 🏆</div>
                  <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
                    {doneDefis.map(d=>DefiCard(d))}
                  </div>
                </div>
              )}

              {/* Nouveau défi */}
              <div style={{ background:C.cream,borderRadius:14,border:`1.5px solid ${C.border}`,padding:"14px 16px" }}>
                <div style={{ fontSize:10,fontWeight:700,letterSpacing:"1.5px",textTransform:"uppercase",color:C.muted,marginBottom:10 }}>Nouveau défi</div>
                <div style={{ display:"flex",gap:8,marginBottom:8,flexWrap:"wrap" }}>
                  <input value={newDefiEmoji} onChange={e=>setNewDefiEmoji(e.target.value)}
                    style={{ width:44,border:`1.5px solid ${C.border}`,background:"white",borderRadius:10,padding:"7px",fontFamily:"inherit",fontSize:18,textAlign:"center",outline:"none" }} />
                  <input value={newDefiName} onChange={e=>setNewDefiName(e.target.value)}
                    placeholder="Nom du défi..."
                    onKeyDown={e=>{ if(e.key==="Enter"&&newDefiName.trim()){ upd(d=>d.defis.push({id:newId(),cat:newDefiCat||"perso",emoji:newDefiEmoji||"⭐",name:newDefiName.trim(),done:false,doneAt:null,notes:""})); setNewDefiName(""); setNewDefiEmoji("⭐"); }}}
                    style={{ flex:1,minWidth:160,border:`1.5px solid ${C.border}`,background:"white",borderRadius:10,padding:"8px 12px",fontFamily:"inherit",fontSize:13,color:C.dark,outline:"none" }} />
                </div>
                <div style={{ display:"flex",gap:8 }}>
                  <datalist id="new-defi-cats">
                    {dynCats.filter(c=>c!=="all").map(c=><option key={c} value={c}/>)}
                  </datalist>
                  <input list="new-defi-cats" value={newDefiCat} onChange={e=>setNewDefiCat(e.target.value)}
                    placeholder="Catégorie..."
                    style={{ flex:1,border:`1.5px solid ${C.border}`,background:"white",borderRadius:10,padding:"8px 12px",fontFamily:"inherit",fontSize:13,color:C.dark,outline:"none" }} />
                  <button onClick={()=>{
                    if(!newDefiName.trim()) return;
                    const cat = newDefiCat.trim().toLowerCase()||"perso";
                    upd(d=>d.defis.push({id:newId(),cat,emoji:newDefiEmoji||"⭐",name:newDefiName.trim(),done:false,doneAt:null,notes:""}));
                    setNewDefiName(""); setNewDefiEmoji("⭐"); setNewDefiCat("");
                    setActiveCat(cat);
                  }}
                    style={{ background:C.dark,border:"none",borderRadius:10,padding:"8px 16px",color:"white",cursor:"pointer",fontSize:13,fontWeight:600,fontFamily:"inherit",whiteSpace:"nowrap" }}>
                    + Ajouter
                  </button>
                </div>
              </div>
            </div>
          );
        })()}
      </div>
        {/* ── CITATIONS ── */}
        {tab==="citations" && (() => {
          const filtered = (data.citations||[]).filter(c => filterText(c.text+" "+(c.source||"")));
          const addCit = () => {
            if(!newCit.trim()) return;
            upd(d=>{ if(!d.citations) d.citations=[]; d.citations.unshift({id:newId(),text:newCit.trim(),source:newSrc.trim(),date:new Date().toLocaleDateString("fr-FR")}); });
            setNewCit(""); setNewSrc("");
          };
          return (
            <div style={{ display:"flex",flexDirection:"column",gap:14 }}>
              <SectionTitle title="💬 Citations & Phrases qui parlent" />

              {/* Formulaire ajout — citation + source sur 2 lignes liées */}
              <div style={{ background:"white",borderRadius:14,border:`1.5px solid ${C.border}`,overflow:"hidden" }}>
                <textarea value={newCit} onChange={e=>setNewCit(e.target.value)}
                  placeholder="Une phrase qui te parle..."
                  onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); addCit(); }}}
                  rows={2}
                  style={{ width:"100%",border:"none",borderBottom:`1px solid ${C.cream}`,padding:"12px 14px",fontFamily:"Georgia,serif",fontSize:13,fontStyle:"italic",color:C.dark,outline:"none",resize:"none",lineHeight:1.6,background:"transparent" }} />
                <div style={{ display:"flex",alignItems:"center",gap:8,padding:"8px 12px" }}>
                  <span style={{ fontSize:12,color:C.muted,flexShrink:0 }}>—</span>
                  <input value={newSrc} onChange={e=>setNewSrc(e.target.value)}
                    placeholder="Source (livre, film, personne...)"
                    style={{ flex:1,border:"none",fontFamily:"inherit",fontSize:12,color:C.muted,outline:"none",background:"transparent" }} />
                  <button onClick={addCit}
                    style={{ flexShrink:0,background:C.dark,border:"none",borderRadius:8,padding:"6px 14px",color:"white",fontSize:13,cursor:"pointer",fontWeight:700,fontFamily:"inherit" }}>+</button>
                </div>
              </div>

              {filtered.length===0 && (
                <div style={{ textAlign:"center",padding:"40px 20px",color:C.muted,fontSize:13 }}>
                  <div style={{ fontSize:32,marginBottom:8 }}>💬</div>
                  Aucune citation pour l'instant.<br/>Saisis une phrase qui te touche !
                </div>
              )}

              {filtered.map(c=>(
                <div key={c.id} style={{ background:"white",borderRadius:14,border:`1.5px solid ${expandedId===c.id?C.dark:C.border}`,overflow:"hidden" }}>
                  {/* Vue normale */}
                  {expandedId!==c.id ? (
                    <div style={{ padding:"18px 20px",position:"relative" }}>
                      <div style={{ fontSize:32,color:C.border,lineHeight:1,marginBottom:4,fontFamily:"Georgia,serif" }}>"</div>
                      <div style={{ fontSize:14,color:C.dark,lineHeight:1.7,fontStyle:"italic",fontFamily:"Georgia,serif",marginBottom:c.source?8:0 }}>{c.text}</div>
                      {c.source && <div style={{ fontSize:11,color:C.muted,fontWeight:600 }}>— {c.source}</div>}
                      <div style={{ fontSize:10,color:C.border,marginTop:6 }}>{c.date}</div>
                      <div style={{ position:"absolute",top:12,right:12,display:"flex",gap:6 }}>
                        <button onClick={()=>setExpId(c.id)}
                          style={{ fontSize:11,color:C.muted,background:"none",border:"none",cursor:"pointer",padding:"2px 6px" }}>✏️</button>
                        <button onClick={()=>upd(d=>{ d.citations=d.citations.filter(x=>x.id!==c.id); })}
                          style={{ fontSize:11,color:C.terra,background:"none",border:"none",cursor:"pointer",padding:"2px 4px" }}>✕</button>
                      </div>
                    </div>
                  ) : (
                    /* Mode édition */
                    <div style={{ padding:"14px 16px" }}>
                      <textarea value={c.text} onChange={e=>upd(d=>{ d.citations.find(x=>x.id===c.id).text=e.target.value; })}
                        style={{ width:"100%",border:`1.5px solid ${C.border}`,background:C.light,borderRadius:10,padding:"10px 12px",fontFamily:"Georgia,serif",fontSize:13,fontStyle:"italic",color:C.dark,outline:"none",resize:"none",minHeight:80,lineHeight:1.6,marginBottom:8 }} />
                      <input value={c.source||""} onChange={e=>upd(d=>{ d.citations.find(x=>x.id===c.id).source=e.target.value; })}
                        placeholder="— Source..."
                        style={{ width:"100%",border:`1.5px solid ${C.border}`,background:C.light,borderRadius:10,padding:"8px 12px",fontFamily:"inherit",fontSize:12,color:C.muted,outline:"none",marginBottom:10 }} />
                      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
                        <button onClick={()=>upd(d=>{ d.citations=d.citations.filter(x=>x.id!==c.id); setExpId(null); })}
                          style={{ fontSize:11,color:C.terra,background:"none",border:"none",cursor:"pointer",padding:0,fontFamily:"inherit" }}>Supprimer</button>
                        <button onClick={()=>setExpId(null)}
                          style={{ fontSize:12,background:C.dark,color:"white",border:"none",borderRadius:8,padding:"6px 14px",cursor:"pointer",fontFamily:"inherit",fontWeight:600 }}>Fermer</button>
                      </div>
                    </div>
                  )}
                </div>
              ))}
            </div>
          );
        })()}

      {/* BOTTOM NAV mobile */}
      <div className="carnet-tabs-mobile" style={{ position:"fixed",bottom:0,left:0,right:0,background:"white",borderTop:`1px solid ${C.border}`,display:"flex",zIndex:200,paddingBottom:"env(safe-area-inset-bottom,0px)" }}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>{ setTab(t.id); setSearch(""); setExpId(null); setMediaCat("Tout"); setActiveCat("all"); }} style={{
            flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
            padding:"7px 2px",border:"none",background:"none",fontFamily:"inherit",cursor:"pointer",
            color:tab===t.id?C.gold:C.muted,transition:"color 0.15s",gap:2
          }}>
            <span style={{ fontSize:18 }}>{t.emoji}</span>
            <span style={{ fontSize:8,fontWeight:tab===t.id?700:400,letterSpacing:"0.2px",textAlign:"center",lineHeight:1.2 }}>{t.label.split(" ")[0]}</span>
          </button>
        ))}
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Carnet />);

</script></body></html>
